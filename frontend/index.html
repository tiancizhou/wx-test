<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>到家按摩</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://fastly.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<style>
:root {
  --bg-primary: #f6f2eb;
  --bg-card: #fbf8f2;
  --text-title: #161514;
  --text-body: #4d4943;
  --text-secondary: #7d786f;
  --border: #d8d2c6;
  --danger: #8d635a;
  --shadow-soft: 0 18px 40px rgba(24, 21, 16, 0.05);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-primary);
  font-family: "IBM Plex Sans", "PingFang SC", "Hiragino Sans GB", sans-serif;
  color: var(--text-body);
}
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.panel {
  width: min(100%, 520px);
  padding: 36px 28px;
  background: var(--bg-card);
  border: 1px solid rgba(216,210,198,.92);
  border-radius: 28px;
  box-shadow: var(--shadow-soft);
}
.kicker {
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.logo {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 1px solid rgba(22,21,20,.14);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-title);
  font-size: 32px;
  font-weight: 700;
  font-family: "Noto Serif SC", serif;
  margin: 18px 0 22px;
}
.title {
  font-family: "Noto Serif SC", serif;
  font-size: 32px;
  line-height: 1.3;
  color: var(--text-title);
  margin-bottom: 10px;
}
.subtitle {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-body);
  margin-bottom: 36px;
}
.status-note {
  font-size: 13px;
  color: var(--text-secondary);
}
.van-loading__text { color: var(--text-title) !important; }
.van-loading__spinner .van-loading__dot { background: var(--text-title) !important; }
.van-button--primary { background: var(--text-title) !important; border-color: var(--text-title) !important; color: #f7f4ed !important; }
</style>
</head>
<body>
<div id="app">
  <div class="container">
    <div class="panel">
      <div class="logo">摩</div>
      <div class="title">到店按摩</div>
      <van-loading v-if="loading" size="36px"></van-loading>
      <div v-else-if="error" class="status-note" style="color:var(--danger);">{{ error }}</div>
    </div>
  </div>
</div>

<script>
let WX_APP_ID = '';
const WX_OAUTH_BASE = 'https://open.weixin.qq.com/connect/oauth2/authorize';
const BASE_URL = 'https://wx.qlc.xn--6qq986b3xl';

async function loadFrontendConfig() {
  const res = await fetch('/config/frontend');
  const cfg = await res.json().catch(() => null);
  if (!res.ok) {
    const detail = cfg && typeof cfg.detail === 'string' && cfg.detail.trim()
      ? cfg.detail.trim()
      : '前端配置获取失败';
    throw new Error(detail);
  }
  if (!cfg || typeof cfg.app_id !== 'string' || !cfg.app_id.trim()) {
    throw new Error('WX_APP_ID 未配置');
  }
  WX_APP_ID = cfg.app_id.trim();
}

const { createApp, ref, onMounted } = Vue;

const app = createApp({
  setup() {
    const loading = ref(true);
    const error = ref('');

    onMounted(async () => {
      try {
        // 1. 已有 token → 直接判断角色跳转
        const token = localStorage.getItem('wx_token');
        if (token) {
          await redirectByRole(token);
          return;
        }

        // 2. URL 有 code → 用 code 换 token
        const params = new URLSearchParams(location.search);
        const code = params.get('code');
        if (code) {
          const res = await fetch(`/wechat/auth?code=${code}`);
          if (res.ok) {
            const data = await res.json();
            localStorage.setItem('wx_token', data.token);
            // 清除 URL 参数
            history.replaceState(null, '', location.pathname);
            await redirectByRole(data.token);
            return;
          }
        }

        // 3. 都没有 → 先加载前端配置，再跳转微信 OAuth
        await loadFrontendConfig();
        const redirectUri = encodeURIComponent(BASE_URL + location.pathname);
        location.href = `${WX_OAUTH_BASE}?appid=${WX_APP_ID}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_userinfo&state=home#wechat_redirect`;
      } catch (e) {
        error.value = '登录失败: ' + e.message;
        loading.value = false;
      }
    });

    async function redirectByRole(token) {
      const res = await fetch('/me', { headers: { 'X-Token': token } });
      if (!res.ok) {
        localStorage.removeItem('wx_token');
        loading.value = false;
        error.value = '获取用户信息失败';
        return;
      }
      const user = await res.json();

      // 根据角色跳转
      const rolePages = {
        CUSTOMER: '/customer',
        MERCHANT: '/merchant',
      };
      const page = rolePages[user.role] || '/customer';
      location.replace(page);
    }

    return { loading, error };
  }
});

app.use(vant);
app.mount('#app');
</script>
</body>
</html>
