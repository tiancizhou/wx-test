<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>商家管理</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css">
<script src="https://fastly.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
:root {
  --bg-primary: #1a1a2e; --bg-card: #252540; --bg-card-hover: #2d2d4a;
  --bg-input: #1e1e36; --bg-chat: #12122a; --gold: #c9a96e;
  --text-title: #ffffff; --text-body: #b0b0c0; --text-secondary: #787890;
  --border: #3a3a5c;
}
.loading-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.order-card { background: var(--bg-card); margin: 10px; border-radius: 10px; padding: 14px; border: 1px solid var(--border); }
.order-card:active { background: var(--bg-card-hover); }
.order-status { display: inline-block; font-size: 12px; padding: 2px 10px; border-radius: 10px; color: #fff; }
.chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 50px - env(safe-area-inset-bottom)); background: var(--bg-chat); }
.chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
.bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; line-height: 1.5; word-break: break-all; display: flex; flex-direction: column; }
.bubble-left { background: var(--bg-card-hover); align-self: flex-start; border-bottom-left-radius: 4px; color: #e0e0e0; }
.bubble-right { background: #2d5a2d; align-self: flex-end; border-bottom-right-radius: 4px; color: #e0e0e0; }
.bubble-role { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
.chat-input-bar { display: flex; padding: 8px 10px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); background: var(--bg-card); border-top: 1px solid var(--border); }
.chat-input-bar input { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; font-size: 14px; outline: none; background: var(--bg-input); color: var(--text-title); }
.chat-input-bar input::placeholder { color: var(--text-secondary); }
.chat-input-bar button { margin-left: 8px; border: none; background: var(--gold); color: var(--bg-primary); border-radius: 20px; padding: 0 20px; font-size: 14px; font-weight: 600; }
.detail-header { background: var(--bg-card); padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
.back-arrow { font-size: 20px; cursor: pointer; margin-right: 10px; color: var(--gold); }
.good-card { background: var(--bg-card); margin: 10px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.good-card-top { display: flex; padding: 12px; }
.good-card-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--bg-input); }
.good-card-info { flex: 1; margin-left: 12px; display: flex; flex-direction: column; justify-content: space-between; }
.good-card-bottom { display: flex; border-top: 1px solid var(--border); }
.good-card-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; color: var(--text-secondary); cursor: pointer; border-right: 1px solid var(--border); }
.good-card-btn:last-child { border-right: none; }
.good-card-btn.danger { color: #e74c3c; }
.good-card-btn.primary { color: var(--gold); }
.good-card-btn.success { color: #07c160; }
.unread-dot { flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%; background: #e74c3c; }
.unread-badge { flex-shrink: 0; min-width: 18px; height: 18px; border-radius: 9px; background: #e74c3c; color: #fff; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
.conv-preview { font-size: 13px; color: var(--text-secondary); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.conv-time { font-size: 11px; color: var(--text-secondary); }
.order-detail-card { background: var(--bg-card); margin: 10px; border-radius: 10px; padding: 12px; border: 1px solid var(--border); }
.order-detail-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-body); margin-top: 6px; }
.order-detail-label { color: var(--text-secondary); }
.order-detail-value { color: var(--text-title); font-weight: 500; }
.bubble-time { font-size: 10px; color: var(--text-secondary); margin-top: 4px; }
.bubble-right .bubble-role { text-align: right; color: #8aad8a; }
.bubble-right .bubble-time { text-align: right; color: #8aad8a; }
.filter-bar { display: flex; gap: 8px; padding: 0 16px 8px; overflow-x: auto; }
.filter-tag { flex-shrink: 0; padding: 6px 14px; border-radius: 16px; font-size: 13px; color: var(--text-secondary); background: var(--bg-card); border: 1px solid var(--border); cursor: pointer; }
.filter-tag.active { color: var(--bg-primary); background: var(--gold); border-color: var(--gold); font-weight: 600; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.upload-area { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 16px; }
.upload-thumb { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; position: relative; }
.upload-add { width: 60px; height: 60px; border: 1px dashed var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--text-secondary); cursor: pointer; }
.upload-remove { position: absolute; top: -4px; right: -4px; width: 18px; height: 18px; background: #e74c3c; color: #fff; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.img-thumb-wrap { position: relative; display: inline-block; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px; }
.stat-card { background: var(--bg-card); border-radius: 10px; padding: 14px; border: 1px solid var(--border); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.stat-value { font-size: 24px; font-weight: 700; color: var(--gold); }
.stat-value.small { font-size: 18px; }
.stat-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.stat-bar-wrap { margin-top: 6px; }
.stat-bar-bg { height: 8px; border-radius: 4px; background: var(--bg-input); overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.stat-rank-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.stat-rank-item:last-child { border-bottom: none; }
.stat-rank-num { width: 22px; height: 22px; border-radius: 50%; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.stat-rank-num.top { background: var(--gold); color: var(--bg-primary); }
.stat-rank-num.normal { background: var(--bg-input); color: var(--text-secondary); }
.stat-section-title { font-size: 14px; font-weight: 600; color: var(--text-title); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.van-tabbar { background: var(--bg-card) !important; border-top: 1px solid var(--border) !important; padding-bottom: env(safe-area-inset-bottom) !important; }
.van-tabbar-item--active { color: var(--gold) !important; }
.van-tabbar-item { color: var(--text-secondary) !important; background: transparent !important; }
.van-button--primary { background: var(--gold) !important; border-color: var(--gold) !important; color: var(--bg-primary) !important; font-weight: 600 !important; }
.van-button--success { background: #07c160 !important; border-color: #07c160 !important; }
.van-popup--bottom { background: var(--bg-primary) !important; }
.van-popup__content { background: var(--bg-primary); }
.form-popup { background: var(--bg-primary); padding: 20px; }
.form-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
.form-input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; background: var(--bg-input); color: var(--text-title); }
.form-input::placeholder { color: var(--text-secondary); }
</style>
</head>
<body>
<div id="app">
  <div v-if="!ready" class="loading-mask">
    <van-loading v-if="!loginError" size="36px">正在登录...</van-loading>
    <div v-else style="text-align:center;">
      <div style="color:var(--text-body);margin-bottom:16px;">登录失败，请重试</div>
      <van-button type="primary" round @click="retryLogin">重新登录</van-button>
    </div>
  </div>

  <template v-else>
  <van-tabbar v-model="activeTab">
    <van-tabbar-item icon="orders-o">订单</van-tabbar-item>
    <van-tabbar-item icon="chat-o" :dot="!!unreadCount">沟通</van-tabbar-item>
    <van-tabbar-item icon="shop-o">商品</van-tabbar-item>
    <van-tabbar-item icon="bar-chart-o">统计</van-tabbar-item>
  </van-tabbar>

  <!-- 订单列表 -->
  <div v-show="activeTab === 0">
    <!-- 订单详情视图 -->
    <div v-if="detailOrder" style="padding-bottom:60px;">
      <div class="detail-header">
        <span class="back-arrow" @click="closeOrderDetail">‹</span>
        <span style="font-weight:600;color:var(--text-title);">订单详情</span>
        <span class="order-status" :style="{background: statusColor(detailOrder.status), marginLeft:'auto'}">{{ statusText(detailOrder.status) }}</span>
      </div>
      <!-- 商品信息 -->
      <div class="order-detail-card">
        <div style="display:flex;gap:12px;">
          <img v-if="detailOrder.good_img_url" :src="detailOrder.good_img_url" style="width:70px;height:70px;border-radius:8px;object-fit:cover;flex-shrink:0;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:15px;font-weight:600;color:var(--text-title);">{{ detailOrder.good_title || '商品' }}</div>
            <div style="font-size:13px;color:var(--text-secondary);margin-top:2px;">{{ detailOrder.good_duration }}分钟</div>
            <div style="display:flex;align-items:baseline;gap:6px;margin-top:4px;">
              <span style="color:var(--gold);font-size:16px;font-weight:700;">¥{{ formatPrice(detailOrder.total_fee) }}</span>
              <span v-if="detailOrder.quantity > 1" style="font-size:12px;color:var(--text-secondary);margin-left:4px;">x{{ detailOrder.quantity }}</span>
            </div>
          </div>
        </div>
      </div>
      <!-- 用户 & 订单信息 -->
      <div class="order-detail-card">
        <div class="order-detail-row"><span class="order-detail-label">订单号</span><span class="order-detail-value" style="font-size:12px;">{{ detailOrder.id }}</span></div>
        <div class="order-detail-row"><span class="order-detail-label">下单时间</span><span class="order-detail-value">{{ formatTime(detailOrder.create_time) }}</span></div>
        <div class="order-detail-row"><span class="order-detail-label">客户电话</span><span class="order-detail-value">{{ detailOrder.phone }}</span></div>
        <div class="order-detail-row"><span class="order-detail-label">预约时间</span><span class="order-detail-value">{{ detailOrder.appointment_time }}</span></div>
        <div class="order-detail-row"><span class="order-detail-label">数量</span><span class="order-detail-value">{{ detailOrder.quantity || 1 }}</span></div>
      </div>
      <!-- 操作按钮 -->
      <div style="padding:0 10px;display:flex;gap:8px;">
        <van-button v-if="detailOrder.status===1" size="small" type="success" @click="completeOrder(detailOrder.id)" :loading="actionLoading" :disabled="actionLoading" style="flex:1;">完成</van-button>
        <van-button v-if="[1,2].includes(detailOrder.status)" size="small" type="danger" plain @click="refundOrderAction(detailOrder)" :loading="actionLoading" :disabled="actionLoading" style="flex:1;">退款</van-button>
      </div>
    </div>
    <!-- 订单列表视图 -->
    <div v-else style="padding-bottom:60px;">
      <div style="padding:12px 16px;font-weight:600;font-size:16px;color:var(--text-title);">订单管理</div>
      <div class="filter-bar">
        <div :class="['filter-tag', orderFilter === null ? 'active' : '']" @click="orderFilter = null">全部</div>
        <div :class="['filter-tag', orderFilter === 1 ? 'active' : '']" @click="orderFilter = orderFilter === 1 ? null : 1">已下单</div>
        <div :class="['filter-tag', orderFilter === 2 ? 'active' : '']" @click="orderFilter = orderFilter === 2 ? null : 2">已完成</div>
        <div :class="['filter-tag', orderFilter === 3 ? 'active' : '']" @click="orderFilter = orderFilter === 3 ? null : 3">退款中</div>
        <div :class="['filter-tag', orderFilter === 4 ? 'active' : '']" @click="orderFilter = orderFilter === 4 ? null : 4">已退款</div>
      </div>
      <div v-if="!filteredOrders.length" style="text-align:center;padding:60px 0;color:var(--text-secondary);font-size:13px;">暂无订单</div>
      <div v-for="o in filteredOrders" :key="o.id" class="order-card" @click="openOrderDetail(o)">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-weight:600;color:var(--text-title);">{{ o.good_title || o.id.slice(-8) }}</span>
          <span class="order-status" :style="{background: statusColor(o.status)}">{{ statusText(o.status) }}</span>
        </div>
        <div style="font-size:13px;color:var(--text-body);margin-top:6px;">{{ o.phone }}</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">预约: {{ o.appointment_time }}</div>
        <div style="font-size:15px;color:var(--gold);margin-top:4px;font-weight:700;">¥{{ formatPrice(o.total_fee) }}<span v-if="o.quantity > 1" style="font-size:12px;color:var(--text-secondary);margin-left:4px;">x{{ o.quantity }}</span></div>
        <div style="margin-top:10px;display:flex;gap:8px;" @click.stop>
          <van-button v-if="o.status===1" size="small" type="success" @click="completeOrder(o.id)" :loading="actionLoading" :disabled="actionLoading">完成</van-button>
        </div>
      </div>
    </div>
  </div>

  <!-- 沟通 -->
  <div v-show="activeTab === 1" style="padding-bottom:60px;">
    <div v-if="!currentConversation">
      <div style="padding:12px 16px;font-weight:600;font-size:16px;color:var(--text-title);">会话</div>
      <div v-if="!conversations.length" style="text-align:center;padding:60px 0;color:var(--text-secondary);font-size:13px;">暂无会话</div>
      <div v-for="conv in conversations" :key="conv.conversation_id" class="order-card" @click="openConversation(conv)">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="display:flex;align-items:center;gap:6px;min-width:0;flex:1;">
            <span v-if="conv.unread_count" class="unread-badge">{{ conv.unread_count }}</span>
            <span style="font-weight:600;color:var(--text-title);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
              {{ conv.customer_nickname || ('客户 #' + conv.customer_id) }}
            </span>
          </div>
          <span class="conv-time">{{ formatTime(conv.last_message_time) }}</span>
        </div>
        <div class="conv-preview">{{ conv.default_merchant_contact?.name || '未分配客服' }} · {{ conv.last_message_preview }}</div>
      </div>
    </div>
    <div v-else class="chat-wrap">
      <div class="detail-header">
        <span class="back-arrow" @click="closeConversation">‹</span>
        <div style="flex:1;">
          <div style="font-weight:600;color:var(--text-title);">{{ currentConversation.customer_nickname || ('客户 #' + currentConversation.customer_id) }}</div>
          <div style="font-size:12px;color:var(--text-secondary);">当前接待：{{ currentConversation.default_merchant_contact?.name || '未分配' }}</div>
        </div>
        <div style="display:flex;gap:8px;">
          <van-button size="mini" plain @click="showContactPicker = true">切换客服</van-button>
          <van-button size="mini" type="primary" @click="showOrderPicker = true">发送订单</van-button>
        </div>
      </div>
      <div class="chat-messages" ref="chatBox">
        <div v-if="!messages.length" style="text-align:center;padding:40px 0;color:var(--text-secondary);font-size:13px;">暂无消息</div>
        <template v-for="m in messages" :key="m.id">
          <div v-if="m.message_type === 'text'"
               :class="['bubble', m.sender_role==='MERCHANT' ? 'bubble-right' : 'bubble-left']"
               style="display:flex;flex-direction:column;">
            <div class="bubble-role">{{ m.sender_role === 'MERCHANT' ? (m.merchant_contact_name || currentConversation.default_merchant_contact?.name || '商家') : (currentConversation.customer_nickname || '客户') }}</div>
            <div>{{ m.content }}</div>
            <div class="bubble-time">{{ formatTime(m.create_time) }}</div>
          </div>
          <div v-else
               :class="['bubble', m.sender_role==='MERCHANT' ? 'bubble-right' : 'bubble-left']"
               style="display:flex;flex-direction:column;">
            <div class="bubble-role">{{ m.sender_role === 'MERCHANT' ? (m.merchant_contact_name || currentConversation.default_merchant_contact?.name || '商家') : (currentConversation.customer_nickname || '客户') }}</div>
            <div style="font-weight:600;">[订单] {{ m.payload?.good_title || '商品' }}</div>
            <div style="font-size:12px;margin-top:4px;">订单号 {{ m.order_id.slice(-8) }}</div>
            <div style="font-size:12px;">预约：{{ m.payload?.appointment_time || '未预约' }}</div>
            <div style="font-size:12px;">金额：¥{{ formatPrice(m.payload?.total_fee || 0) }}</div>
            <div class="bubble-time">{{ formatTime(m.create_time) }}</div>
          </div>
        </template>
      </div>
      <div class="chat-input-bar">
        <input v-model="msgInput" placeholder="回复客户..." @keyup.enter="sendMessage">
        <button @click="sendMessage">发送</button>
      </div>
    </div>
  </div>

  <van-popup v-model:show="showContactPicker" position="bottom" round>
    <div style="padding:20px;">
      <div style="font-size:16px;font-weight:600;color:#fff;margin-bottom:12px;">切换接待客服</div>
      <div v-if="!merchantContacts.length" style="text-align:center;padding:20px 0;color:var(--text-secondary);font-size:13px;">暂无可用客服</div>
      <div v-for="contact in merchantContacts" :key="contact.id" class="order-card" @click="switchConversationContact(contact)">
        <div style="font-weight:600;color:var(--text-title);">{{ contact.name }}</div>
        <div class="conv-preview">微信：{{ contact.wechat || '未填' }} · 手机：{{ contact.phone || '未填' }}</div>
      </div>
    </div>
  </van-popup>

  <van-popup v-model:show="showOrderPicker" position="bottom" round>
    <div style="padding:20px;max-height:60vh;overflow-y:auto;">
      <div style="font-size:16px;font-weight:600;color:#fff;margin-bottom:12px;">选择订单</div>
      <div v-if="!conversationOrders.length" style="text-align:center;padding:20px 0;color:var(--text-secondary);font-size:13px;">当前客户暂无可发送订单</div>
      <div v-for="order in conversationOrders" :key="order.id" class="order-card" @click="sendOrderCard(order)">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-weight:600;color:var(--text-title);">{{ order.good_title || '商品' }}</span>
          <span class="order-status" :style="{background: statusColor(order.status)}">{{ statusText(order.status) }}</span>
        </div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:6px;">订单号 {{ order.id.slice(-8) }} · {{ order.appointment_time }}</div>
        <div style="font-size:15px;color:var(--gold);margin-top:4px;font-weight:700;">¥{{ formatPrice(order.total_fee) }}</div>
      </div>
    </div>
  </van-popup>

  <!-- 商品管理 -->
  <div v-show="activeTab === 2" style="padding-bottom:60px;">
    <div style="padding:12px 16px;font-weight:600;font-size:16px;color:var(--text-title);display:flex;justify-content:space-between;align-items:center;">
      <span>商品管理 ({{ goods.length }})</span>
      <van-button size="small" type="primary" icon="plus" @click="openCreateGood">创建商品</van-button>
    </div>
    <div v-if="!goods.length" style="text-align:center;padding:60px 0;color:var(--text-secondary);font-size:13px;">暂无商品，点击右上角创建</div>
    <div v-for="g in goods" :key="g.id" class="good-card">
      <div class="good-card-top">
        <img :src="g.img_url || 'https://via.placeholder.com/80'" class="good-card-img" @error="$event.target.src='https://via.placeholder.com/80'">
        <div class="good-card-info">
          <div>
            <div style="font-weight:600;font-size:15px;color:var(--text-title);">{{ g.title }}</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">{{ g.description || '暂无描述' }}</div>
          </div>
          <div style="display:flex;align-items:baseline;gap:6px;">
            <span style="color:var(--gold);font-size:17px;font-weight:700;">¥{{ formatPrice(g.price) }}</span>
            <span v-if="g.original_price" style="font-size:12px;color:var(--text-secondary);text-decoration:line-through;">¥{{ formatPrice(g.original_price) }}</span>
            <span style="font-size:12px;color:var(--text-secondary);margin-left:auto;">{{ g.duration }}分钟</span>
          </div>
          <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">已售 {{ g.sales || 0 }}</div>
          <div style="font-size:12px;margin-top:4px;">
            <span class="status-dot" :style="{background: g.is_active ? '#07c160' : 'var(--text-secondary)'}"></span>
            <span :style="{color: g.is_active ? '#07c160' : 'var(--text-secondary)'}">{{ g.is_active ? '上架中' : '已下架' }}</span>
          </div>
        </div>
      </div>
      <div class="good-card-bottom">
        <div class="good-card-btn" :class="g.is_active ? 'danger' : 'success'" @click="toggleGood(g)">
          {{ g.is_active ? '下架' : '上架' }}
        </div>
        <div class="good-card-btn primary" @click="openEditGood(g)">编辑</div>
        <div class="good-card-btn danger" @click="confirmDeleteGood(g)">删除</div>
      </div>
    </div>
  </div>

  <!-- 统计 -->
  <div v-show="activeTab === 3" style="padding-bottom:60px;">
    <div style="padding:12px 16px;font-weight:600;font-size:16px;color:var(--text-title);">经营数据</div>
    <template v-if="stats">
      <!-- 今日数据 -->
      <div style="padding:0 16px 4px;font-size:13px;color:var(--text-secondary);">今日</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">营收</div>
          <div class="stat-value">¥{{ formatPrice(stats.today.revenue) }}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">订单数</div>
          <div class="stat-value">{{ stats.today.order_count }}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">客户数</div>
          <div class="stat-value">{{ stats.today.customers }}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">客单价</div>
          <div class="stat-value">¥{{ formatPrice(stats.today.avg_fee) }}</div>
        </div>
      </div>

      <!-- 本月数据 -->
      <div style="padding:16px 16px 4px;font-size:13px;color:var(--text-secondary);">本月</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">营收</div>
          <div class="stat-value.small">¥{{ formatPrice(stats.month.revenue) }}</div>
          <div class="stat-sub">{{ stats.month.order_count }} 笔订单</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">客户数</div>
          <div class="stat-value.small">{{ stats.month.customers }}</div>
          <div class="stat-sub">客单价 ¥{{ formatPrice(stats.month.avg_fee) }}</div>
        </div>
      </div>

      <!-- 订单状态分布 -->
      <div style="padding:16px 16px 0;">
        <div class="stat-section-title">订单状态分布（本月）</div>
        <div v-for="(item, idx) in statusDistList" :key="idx" style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
            <span style="color:var(--text-body);">{{ item.label }}</span>
            <span style="color:var(--text-title);font-weight:500;">{{ item.count }}</span>
          </div>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill" :style="{width: item.pct + '%', background: item.color}"></div>
          </div>
        </div>
        <div v-if="!statusDistList.length" style="text-align:center;padding:20px 0;color:var(--text-secondary);font-size:13px;">暂无数据</div>
      </div>

      <!-- 商品销量排行 -->
      <div style="padding:16px 16px 0;">
        <div class="stat-section-title">商品销量排行（本月）</div>
        <div v-if="!stats.top_goods.length" style="text-align:center;padding:20px 0;color:var(--text-secondary);font-size:13px;">暂无数据</div>
        <div v-for="(g, idx) in stats.top_goods" :key="idx" class="stat-rank-item">
          <span :class="['stat-rank-num', idx < 3 ? 'top' : 'normal']">{{ idx + 1 }}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;color:var(--text-title);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ g.title }}</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">销量 {{ g.sales }} · ¥{{ formatPrice(g.revenue) }}</div>
          </div>
        </div>
      </div>
    </template>
    <div v-else style="text-align:center;padding:60px 0;color:var(--text-secondary);">加载中...</div>
  </div>

  <!-- 创建/编辑商品弹窗 -->
  <van-popup v-model:show="showGoodForm" position="bottom" round :style="{ minHeight: '80%' }">
    <div class="form-popup" style="max-height:90vh;overflow-y:auto;">
      <div style="font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text-title);">{{ isEditGood ? '编辑商品' : '创建商品' }}</div>

      <!-- 商品名称 -->
      <div style="margin-bottom:12px;">
        <div class="form-label">商品名称 *</div>
        <input v-model="goodForm.title" placeholder="请输入商品名称" class="form-input">
      </div>

      <!-- 价格行 -->
      <div style="display:flex;gap:10px;margin-bottom:12px;">
        <div style="flex:1;">
          <div class="form-label">价格(元) *</div>
          <input v-model="goodForm.priceYuan" type="number" placeholder="298" class="form-input">
        </div>
        <div style="flex:1;">
          <div class="form-label">原价(元)</div>
          <input v-model="goodForm.originalPriceYuan" type="number" placeholder="398" class="form-input">
        </div>
      </div>

      <!-- 时长 + 销量 -->
      <div style="display:flex;gap:10px;margin-bottom:12px;">
        <div style="flex:1;">
          <div class="form-label">时长(分钟)</div>
          <input v-model="goodForm.duration" type="number" placeholder="60" class="form-input">
        </div>
        <div style="flex:1;">
          <div class="form-label">已售数量</div>
          <input v-model="goodForm.sales" type="number" placeholder="0" class="form-input">
        </div>
      </div>

      <!-- 封面图 -->
      <div class="form-label">封面图</div>
      <div class="upload-area" style="margin-bottom:12px;">
        <div v-if="goodForm.img_url" class="img-thumb-wrap">
          <img :src="goodForm.img_url" class="upload-thumb">
          <div class="upload-remove" @click="goodForm.img_url=''">&times;</div>
        </div>
        <label class="upload-add">
          +
          <input type="file" accept="image/*" style="display:none" @change="e => uploadCover(e)">
        </label>
      </div>

      <!-- 商品简介文字 -->
      <div class="form-label">商品简介</div>
      <textarea v-model="goodForm.description" placeholder="请输入商品简介文字..." rows="4"
                class="form-input" style="resize:vertical;font-family:inherit;margin-bottom:8px;"></textarea>

      <!-- 简介图片 -->
      <div class="form-label" style="margin-bottom:4px;">简介图片（最多9张）</div>
      <div class="upload-area" style="margin-bottom:16px;">
        <div v-for="(img, i) in goodForm.detailImages" :key="i" class="img-thumb-wrap">
          <img :src="img" class="upload-thumb">
          <div class="upload-remove" @click="removeDetailImg(i)">&times;</div>
        </div>
        <label v-if="goodForm.detailImages.length < 9" class="upload-add">
          +
          <input type="file" accept="image/*" style="display:none" @change="e => uploadDetail(e)">
        </label>
      </div>

      <van-button type="primary" block round @click="saveGoodForm" :loading="savingGood">
        {{ isEditGood ? '保存修改' : '创建商品' }}
      </van-button>
    </div>
  </van-popup>
  </template>
</div>

<script>
// ---- 前端配置 ----
let WX_APP_ID = '';
let BASE_URL = 'https://wx.qlc.xn--6qq986b3xl';
const WX_OAUTH_BASE = 'https://open.weixin.qq.com/connect/oauth2/authorize';

async function initConfig() {
  const res = await fetch('/config/frontend');
  const cfg = await res.json().catch(() => null);
  if (!res.ok) {
    const detail = cfg && typeof cfg.detail === 'string' && cfg.detail.trim()
      ? cfg.detail.trim()
      : '前端配置获取失败';
    throw new Error(detail);
  }
  if (!cfg || typeof cfg.app_id !== 'string' || !cfg.app_id.trim()) {
    throw new Error('WX_APP_ID 未配置');
  }
  WX_APP_ID = cfg.app_id.trim();
  if (cfg.base_url) BASE_URL = cfg.base_url;
}

async function wxLogin() {
  const token = localStorage.getItem('wx_token');
  if (token) return token;
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (code) {
    const res = await fetch(`/wechat/auth?code=${code}`);
    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('wx_token', data.token);
      params.delete('code'); params.delete('state');
      history.replaceState(null, '', location.pathname + (params.toString() ? '?' + params : ''));
      return data.token;
    }
  }
  if (!WX_APP_ID) {
    throw new Error('WX_APP_ID 未配置');
  }
  const redirectUri = encodeURIComponent(BASE_URL + location.pathname);
  location.href = `${WX_OAUTH_BASE}?appid=${WX_APP_ID}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_userinfo&state=merchant#wechat_redirect`;
}

async function wxJSSDKInit() {
  try {
    const url = location.href.split('#')[0];
    const res = await fetch(`/wechat/jssdk?url=${encodeURIComponent(url)}`);
    if (!res.ok) return;
    const cfg = await res.json();
    wx.config({ debug: false, appId: cfg.appId, timestamp: cfg.timestamp, nonceStr: cfg.nonceStr, signature: cfg.signature, jsApiList: [] });
  } catch (e) { console.warn('JS-SDK 初始化失败:', e); }
}

const { createApp, ref, computed, watch, onMounted, onUnmounted, nextTick } = Vue;

const app = createApp({
  setup() {
    const API = '';
    const TOKEN = () => localStorage.getItem('wx_token') || '';
    const headers = () => ({ 'X-Token': TOKEN(), 'Content-Type': 'application/json' });

    const ready = ref(false);
    const loginError = ref(false);
    const actionLoading = ref(false);
    const activeTab = ref(0);

    const orders = ref([]);
    const goods = ref([]);
    const detailOrder = ref(null);
    const conversations = ref([]);
    const currentConversation = ref(null);
    const messages = ref([]);
    const msgInput = ref('');
    const chatBox = ref(null);
    const merchantContacts = ref([]);
    const showContactPicker = ref(false);
    const showOrderPicker = ref(false);
    const stats = ref(null);

    const orderFilter = ref(null);
    const filteredOrders = computed(() => {
      if (orderFilter.value === null) return orders.value;
      return orders.value.filter(order => order.status === orderFilter.value);
    });
    const conversationOrders = computed(() => {
      if (!currentConversation.value) return [];
      return orders.value.filter(order =>
        order.customer_id === currentConversation.value.customer_id &&
        order.status >= 1
      );
    });
    const unreadCount = computed(() => conversations.value.reduce((sum, item) => sum + (item.unread_count || 0), 0));
    const statusDistList = computed(() => {
      if (!stats.value) return [];
      const dist = stats.value.status_dist || {};
      const total = Object.values(dist).reduce((a, b) => a + b, 0) || 1;
      const items = [
        { key: 'ordered', label: '已下单', color: '#d4a03c' },
        { key: 'completed', label: '已完成', color: '#07c160' },
        { key: 'refunding', label: '退款中', color: '#e6a23c' },
        { key: 'refunded', label: '已退款', color: '#c0564a' },
      ];
      return items.filter(item => dist[item.key]).map(item => ({
        ...item,
        count: dist[item.key],
        pct: Math.round((dist[item.key] / total) * 100),
      }));
    });

    const showGoodForm = ref(false);
    const isEditGood = ref(false);
    const savingGood = ref(false);
    const goodForm = ref({ id: 0, title: '', description: '', priceYuan: '', originalPriceYuan: '', duration: '60', sales: '0', img_url: '', detailImages: [] });

    let pollTimer = null;

    function emptyGoodForm() {
      return { id: 0, title: '', description: '', priceYuan: '', originalPriceYuan: '', duration: '60', sales: '0', img_url: '', detailImages: [] };
    }

    async function api(path, opts = {}) {
      const res = await fetch(API + path, { headers: headers(), ...opts });
      if (res.status === 401) {
        localStorage.removeItem('wx_token');
        location.reload();
        throw new Error('登录已过期');
      }
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function formatPrice(fen) {
      return (Number(fen || 0) / 100).toFixed(2);
    }

    function isNearBottom(el) {
      return el.scrollHeight - el.scrollTop - el.clientHeight < 100;
    }

    function scrollChatToBottom(force = false) {
      if (!chatBox.value) return;
      if (force || isNearBottom(chatBox.value)) {
        chatBox.value.scrollTop = chatBox.value.scrollHeight;
      }
    }

    async function uploadImage(file) {
      const formData = new FormData();
      formData.append('file', file);
      const res = await fetch('/upload', { method: 'POST', headers: { 'X-Token': TOKEN() }, body: formData });
      if (!res.ok) throw new Error('上传失败');
      const data = await res.json();
      return data.url;
    }

    async function uploadCover(e) {
      const file = e.target.files[0];
      if (!file) return;
      try {
        vant.showToast({ message: '上传中...', forbidClick: true, duration: 0 });
        goodForm.value.img_url = await uploadImage(file);
        vant.closeToast();
      } catch {
        vant.showToast('上传失败');
      }
      e.target.value = '';
    }

    async function uploadDetail(e) {
      const file = e.target.files[0];
      if (!file) return;
      try {
        vant.showToast({ message: '上传中...', forbidClick: true, duration: 0 });
        const url = await uploadImage(file);
        goodForm.value.detailImages.push(url);
        vant.closeToast();
      } catch {
        vant.showToast('上传失败');
      }
      e.target.value = '';
    }

    function removeDetailImg(index) {
      goodForm.value.detailImages.splice(index, 1);
    }

    async function loadOrders() {
      try {
        orders.value = await api('/orders/active');
      } catch (e) {
        console.error('loadOrders:', e);
      }
    }

    async function loadGoods() {
      try {
        goods.value = await api('/goods/all');
      } catch (e) {
        console.error('loadGoods:', e);
      }
    }

    async function loadStats() {
      try {
        stats.value = await api('/stats/dashboard');
      } catch (e) {
        console.error('loadStats:', e);
      }
    }

    async function loadConversations() {
      try {
        const list = await api('/merchant/conversations');
        conversations.value = list;
        if (currentConversation.value) {
          const next = list.find(item => item.conversation_id === currentConversation.value.conversation_id);
          if (next) currentConversation.value = { ...currentConversation.value, ...next };
        }
      } catch (e) {
        console.error('loadConversations:', e);
      }
    }

    async function loadMerchantContacts() {
      try {
        merchantContacts.value = await api('/merchant-contacts');
      } catch (e) {
        console.error('loadMerchantContacts:', e);
      }
    }

    async function openConversation(conv) {
      currentConversation.value = { ...conv };
      messages.value = await api(`/merchant/conversations/${conv.conversation_id}/messages?after_id=0`);
      if (messages.value.length) {
        await api(`/merchant/conversations/${conv.conversation_id}/read`, {
          method: 'POST',
          body: JSON.stringify({ last_message_id: messages.value[messages.value.length - 1].id }),
        });
        currentConversation.value.unread_count = 0;
        const idx = conversations.value.findIndex(item => item.conversation_id === conv.conversation_id);
        if (idx >= 0) conversations.value[idx] = { ...conversations.value[idx], unread_count: 0 };
      }
      await nextTick();
      scrollChatToBottom(true);
    }

    function closeConversation() {
      currentConversation.value = null;
      messages.value = [];
      msgInput.value = '';
      showOrderPicker.value = false;
    }

    async function sendMessage() {
      if (!msgInput.value.trim() || !currentConversation.value) return;
      const sent = await api(`/merchant/conversations/${currentConversation.value.conversation_id}/messages`, {
        method: 'POST',
        body: JSON.stringify({ message_type: 'text', content: msgInput.value }),
      });
      msgInput.value = '';
      messages.value.push(sent);
      await loadConversations();
      await nextTick();
      scrollChatToBottom(true);
    }

    async function sendOrderCard(order) {
      if (!currentConversation.value) return;
      const sent = await api(`/merchant/conversations/${currentConversation.value.conversation_id}/messages`, {
        method: 'POST',
        body: JSON.stringify({ message_type: 'order_card', order_id: order.id }),
      });
      messages.value.push(sent);
      showOrderPicker.value = false;
      await loadConversations();
      await nextTick();
      scrollChatToBottom(true);
    }

    async function switchConversationContact(contact) {
      if (!currentConversation.value) return;
      const updated = await api(`/merchant/conversations/${currentConversation.value.conversation_id}/default-contact`, {
        method: 'POST',
        body: JSON.stringify({ merchant_contact_id: contact.id }),
      });
      currentConversation.value = { ...currentConversation.value, ...updated };
      const idx = conversations.value.findIndex(item => item.conversation_id === updated.conversation_id);
      if (idx >= 0) conversations.value[idx] = { ...conversations.value[idx], ...updated };
      showContactPicker.value = false;
    }

    async function pollConversationMessages() {
      if (!currentConversation.value) return;
      const lastId = messages.value.length ? messages.value[messages.value.length - 1].id : 0;
      const newer = await api(`/merchant/conversations/${currentConversation.value.conversation_id}/messages?after_id=${lastId}`);
      if (newer.length) {
        messages.value.push(...newer);
        await api(`/merchant/conversations/${currentConversation.value.conversation_id}/read`, {
          method: 'POST',
          body: JSON.stringify({ last_message_id: messages.value[messages.value.length - 1].id }),
        });
        currentConversation.value.unread_count = 0;
        await loadConversations();
        await nextTick();
        scrollChatToBottom(true);
      } else {
        await loadConversations();
      }
    }

    function openOrderDetail(order) {
      detailOrder.value = order;
    }

    function closeOrderDetail() {
      detailOrder.value = null;
    }

    async function completeOrder(id) {
      actionLoading.value = true;
      try {
        await api(`/orders/${id}/complete`, { method: 'POST' });
        vant.showToast('已完成');
        await loadOrders();
        await loadStats();
        detailOrder.value = null;
      } finally {
        actionLoading.value = false;
      }
    }

    async function refundOrderAction(order) {
      try {
        await vant.showConfirmDialog({ title: '确认退款', message: '确认对该订单进行退款？' });
      } catch {
        return;
      }
      actionLoading.value = true;
      try {
        await api(`/pay/refund/${order.id}`, { method: 'POST', body: JSON.stringify({}) });
        vant.showToast('退款申请已提交');
        await loadOrders();
        await loadStats();
        detailOrder.value = null;
      } catch (e) {
        vant.showToast('退款失败: ' + (e.message || e));
      } finally {
        actionLoading.value = false;
      }
    }

    function openCreateGood() {
      isEditGood.value = false;
      goodForm.value = emptyGoodForm();
      showGoodForm.value = true;
    }

    function openEditGood(good) {
      isEditGood.value = true;
      let detailImages = [];
      try {
        detailImages = JSON.parse(good.detail_images || '[]');
      } catch {}
      goodForm.value = {
        id: good.id,
        title: good.title,
        description: good.description,
        priceYuan: good.price ? String(good.price / 100) : '',
        originalPriceYuan: good.original_price ? String(good.original_price / 100) : '',
        duration: String(good.duration),
        sales: String(good.sales || 0),
        img_url: good.img_url,
        detailImages,
      };
      showGoodForm.value = true;
    }

    async function saveGoodForm() {
      const form = goodForm.value;
      if (!form.title.trim()) {
        vant.showToast('请输入商品名称');
        return;
      }
      if (!form.priceYuan || Number(form.priceYuan) <= 0) {
        vant.showToast('请输入有效价格');
        return;
      }
      savingGood.value = true;
      try {
        const payload = {
          title: form.title,
          description: form.description,
          price: Math.round(Number(form.priceYuan) * 100),
          original_price: form.originalPriceYuan ? Math.round(Number(form.originalPriceYuan) * 100) : 0,
          duration: Number(form.duration),
          img_url: form.img_url,
          sales: Number(form.sales || 0),
          detail_images: JSON.stringify(form.detailImages),
        };
        if (isEditGood.value) {
          await api(`/goods/${form.id}`, { method: 'PUT', body: JSON.stringify(payload) });
          vant.showToast('已保存');
        } else {
          await api('/goods', { method: 'POST', body: JSON.stringify(payload) });
          vant.showToast('创建成功');
        }
        showGoodForm.value = false;
        await loadGoods();
      } finally {
        savingGood.value = false;
      }
    }

    async function toggleGood(good) {
      await api(`/goods/${good.id}`, { method: 'PUT', body: JSON.stringify({ is_active: !good.is_active }) });
      vant.showToast(good.is_active ? '已下架' : '已上架');
      await loadGoods();
    }

    function confirmDeleteGood(good) {
      vant.showConfirmDialog({ title: '确认删除', message: `删除商品「${good.title}」？此操作不可恢复。` })
        .then(() => deleteGood(good.id))
        .catch(() => {});
    }

    async function deleteGood(id) {
      await api(`/goods/${id}`, { method: 'DELETE' });
      vant.showToast('已删除');
      await loadGoods();
    }

    function statusText(status) {
      return { 0: '待付款', 1: '已下单', 2: '已完成', 3: '退款中', 4: '已退款' }[status] ?? '未知';
    }

    function statusColor(status) {
      return { 0: '#787890', 1: '#d4a03c', 2: '#07c160', 3: '#e6a23c', 4: '#c0564a' }[status] ?? '#787890';
    }

    function formatTime(ts) {
      const d = new Date(Number(ts || 0) * 1000);
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
      if (d.toDateString() === now.toDateString()) return time;
      const yesterday = new Date(now);
      yesterday.setDate(now.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return '昨天 ' + time;
      return `${d.getMonth() + 1}/${d.getDate()} ${time}`;
    }

    function retryLogin() {
      loginError.value = false;
      localStorage.removeItem('wx_token');
      location.reload();
    }

    async function handlePoll() {
      await loadOrders();
      if (activeTab.value === 1 && currentConversation.value) {
        await pollConversationMessages();
      } else {
        await loadConversations();
      }
    }

    const handleResize = () => scrollChatToBottom();
    const handleVisibilityChange = () => {
      if (document.hidden) {
        clearInterval(pollTimer);
        pollTimer = null;
      } else if (ready.value) {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(handlePoll, 5000);
        loadOrders();
        loadGoods();
        loadStats();
        loadConversations();
      }
    };

    watch(activeTab, async tab => {
      if (tab === 1) {
        await loadConversations();
      } else if (tab === 3 && !stats.value) {
        await loadStats();
      }
    });

    onMounted(async () => {
      try {
        await initConfig();
        await wxLogin();
        ready.value = true;
        loginError.value = false;
        wxJSSDKInit();
        await Promise.all([
          loadOrders(),
          loadGoods(),
          loadStats(),
          loadConversations(),
          loadMerchantContacts(),
        ]);
        pollTimer = setInterval(handlePoll, 5000);
        window.addEventListener('resize', handleResize);
        document.addEventListener('visibilitychange', handleVisibilityChange);
      } catch (e) {
        console.error('登录失败:', e);
        loginError.value = true;
      }
    });

    onUnmounted(() => {
      clearInterval(pollTimer);
      pollTimer = null;
      window.removeEventListener('resize', handleResize);
      document.removeEventListener('visibilitychange', handleVisibilityChange);
    });

    return {
      ready,
      loginError,
      activeTab,
      orders,
      filteredOrders,
      orderFilter,
      conversations,
      currentConversation,
      goods,
      detailOrder,
      messages,
      msgInput,
      chatBox,
      merchantContacts,
      showContactPicker,
      showOrderPicker,
      stats,
      statusDistList,
      actionLoading,
      showGoodForm,
      isEditGood,
      savingGood,
      goodForm,
      openOrderDetail,
      closeOrderDetail,
      openConversation,
      closeConversation,
      completeOrder,
      refundOrderAction,
      sendMessage,
      sendOrderCard,
      switchConversationContact,
      openCreateGood,
      openEditGood,
      saveGoodForm,
      toggleGood,
      confirmDeleteGood,
      uploadCover,
      uploadDetail,
      removeDetailImg,
      unreadCount,
      conversationOrders,
      statusText,
      statusColor,
      formatTime,
      formatPrice,
      retryLogin,
    };
  }
});

app.use(vant);
app.mount('#app');
</script>
</body>
</html>
