<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>商家管理</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css">
<script src="https://fastly.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.loading-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; }
.order-card { background: #fff; margin: 10px; border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.order-status { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 4px; color: #fff; }
.bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; line-height: 1.5; }
.bubble-left { background: #fff; border-bottom-left-radius: 4px; }
.bubble-right { background: #95ec69; border-bottom-right-radius: 4px; margin-left: auto; }
.bubble-role { font-size: 11px; color: #999; margin-bottom: 2px; }
.chat-input-bar { display: flex; padding: 8px 10px; background: #fff; border-top: 1px solid #eee; }
.chat-input-bar input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 8px 14px; font-size: 14px; outline: none; }
.chat-input-bar button { margin-left: 8px; border: none; background: #07c160; color: #fff; border-radius: 20px; padding: 0 20px; font-size: 14px; }
.good-card { background: #fff; margin: 10px; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.good-card-top { display: flex; padding: 12px; }
.good-card-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #f0f0f0; }
.good-card-info { flex: 1; margin-left: 12px; display: flex; flex-direction: column; justify-content: space-between; }
.good-card-bottom { display: flex; border-top: 1px solid #f5f5f5; }
.good-card-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; color: #666; cursor: pointer; border-right: 1px solid #f5f5f5; }
.good-card-btn:last-child { border-right: none; }
.good-card-btn.danger { color: #e74c3c; }
.good-card-btn.primary { color: #1890ff; }
.good-card-btn.success { color: #07c160; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.upload-area { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 16px; }
.upload-thumb { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; position: relative; }
.upload-add { width: 60px; height: 60px; border: 1px dashed #ccc; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #ccc; cursor: pointer; }
.upload-add:hover { border-color: #1890ff; color: #1890ff; }
.upload-remove { position: absolute; top: -4px; right: -4px; width: 18px; height: 18px; background: #e74c3c; color: #fff; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; line-height: 1; }
.img-thumb-wrap { position: relative; display: inline-block; }
</style>
</head>
<body>
<div id="app">
  <div v-if="!ready" class="loading-mask">
    <van-loading size="36px">正在登录...</van-loading>
  </div>

  <template v-else>
  <van-tabbar v-model="activeTab">
    <van-tabbar-item icon="orders-o">订单</van-tabbar-item>
    <van-tabbar-item icon="chat-o">沟通</van-tabbar-item>
    <van-tabbar-item icon="shop-o">商品</van-tabbar-item>
  </van-tabbar>

  <!-- 待接单/活跃订单 -->
  <div v-show="activeTab === 0" style="padding-bottom:60px;">
    <div style="padding:12px 16px;font-weight:600;font-size:16px;">活跃订单</div>
    <div v-if="!orders.length" style="text-align:center;padding:60px 0;color:#999;">暂无活跃订单</div>
    <div v-for="o in orders" :key="o.id" class="order-card" @click="openChat(o)">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:600;">{{ o.id.slice(-8) }}</span>
        <span class="order-status" :style="{background: statusColor(o.status)}">{{ statusText(o.status) }}</span>
      </div>
      <div style="font-size:13px;color:#666;margin-top:6px;">{{ o.phone }} · {{ o.address }}</div>
      <div style="font-size:13px;color:#999;">预约时间: {{ o.appointment_time }}</div>
      <div style="font-size:15px;color:#e74c3c;margin-top:4px;">¥{{ (o.total_fee/100).toFixed(0) }}</div>
      <div style="margin-top:10px;display:flex;gap:8px;" @click.stop>
        <van-button v-if="o.status===1" size="small" type="primary" @click="acceptOrder(o.id)">接单</van-button>
        <van-button v-if="o.status===2" size="small" type="success" @click="completeOrder(o.id)">完成</van-button>
      </div>
    </div>
  </div>

  <!-- 聊天 -->
  <div v-show="activeTab === 1" style="display:flex;flex-direction:column;height:100vh;">
    <div v-if="!currentOrder" style="text-align:center;padding:80px 0;color:#999;">请从订单进入沟通</div>
    <template v-else>
      <div style="flex:1;overflow-y:auto;padding:10px;background:#f0f0f0;" ref="chatBox">
        <div v-for="m in messages" :key="m.id" :class="['bubble', m.sender_role==='MERCHANT' ? 'bubble-right' : 'bubble-left']">
          <div class="bubble-role">{{ roleLabel(m.sender_role) }}</div>
          <div>{{ m.content }}</div>
        </div>
      </div>
      <div class="chat-input-bar">
        <input v-model="msgInput" placeholder="回复客户..." @keyup.enter="sendMessage">
        <button @click="sendMessage">发送</button>
      </div>
    </template>
  </div>

  <!-- 商品管理 -->
  <div v-show="activeTab === 2" style="padding-bottom:60px;">
    <div style="padding:12px 16px;font-weight:600;font-size:16px;display:flex;justify-content:space-between;align-items:center;">
      <span>商品管理 ({{ goods.length }})</span>
      <van-button size="small" type="primary" icon="plus" @click="openCreateGood">创建商品</van-button>
    </div>
    <div v-if="!goods.length" style="text-align:center;padding:60px 0;color:#999;">暂无商品，点击右上角创建</div>
    <div v-for="g in goods" :key="g.id" class="good-card">
      <div class="good-card-top">
        <img :src="g.img_url || 'https://via.placeholder.com/80'" class="good-card-img" @error="$event.target.src='https://via.placeholder.com/80'">
        <div class="good-card-info">
          <div>
            <div style="font-weight:600;font-size:15px;">{{ g.title }}</div>
            <div style="font-size:12px;color:#999;margin-top:4px;">{{ g.description || '暂无描述' }}</div>
          </div>
          <div style="display:flex;align-items:baseline;gap:6px;">
            <span style="color:#e74c3c;font-size:17px;font-weight:700;">¥{{ (g.price/100).toFixed(0) }}</span>
            <span v-if="g.original_price" style="font-size:12px;color:#bbb;text-decoration:line-through;">¥{{ (g.original_price/100).toFixed(0) }}</span>
            <span style="font-size:12px;color:#999;margin-left:auto;">{{ g.duration }}分钟</span>
          </div>
          <div style="font-size:12px;color:#999;margin-top:2px;">已售 {{ g.sales || 0 }}</div>
          <div style="font-size:12px;margin-top:4px;">
            <span class="status-dot" :style="{background: g.is_active ? '#07c160' : '#ccc'}"></span>
            <span :style="{color: g.is_active ? '#07c160' : '#999'}">{{ g.is_active ? '上架中' : '已下架' }}</span>
          </div>
        </div>
      </div>
      <div class="good-card-bottom">
        <div class="good-card-btn" :class="g.is_active ? 'danger' : 'success'" @click="toggleGood(g)">
          {{ g.is_active ? '下架' : '上架' }}
        </div>
        <div class="good-card-btn primary" @click="openEditGood(g)">编辑</div>
        <div class="good-card-btn danger" @click="confirmDeleteGood(g)">删除</div>
      </div>
    </div>
  </div>

  <!-- 创建/编辑商品弹窗 -->
  <van-popup v-model:show="showGoodForm" position="bottom" round :style="{ minHeight: '80%' }">
    <div style="padding:20px;max-height:90vh;overflow-y:auto;">
      <div style="font-size:16px;font-weight:600;margin-bottom:16px;">{{ isEditGood ? '编辑商品' : '创建商品' }}</div>

      <!-- 基本信息 -->
      <div style="font-size:14px;font-weight:600;color:#333;margin-bottom:8px;">基本信息</div>
      <van-cell-group inset>
        <van-field v-model="goodForm.title" label="商品名称" placeholder="请输入商品名称" required />
        <van-field v-model="goodForm.priceYuan" label="价格(元)" type="number" placeholder="如 298" required />
        <van-field v-model="goodForm.originalPriceYuan" label="原价(元)" type="number" placeholder="如 398（可选）" />
        <van-field v-model="goodForm.duration" label="时长(分钟)" type="number" placeholder="如 60" />
        <van-field v-model="goodForm.sales" label="已售数量" type="number" placeholder="如 128" />
      </van-cell-group>

      <!-- 封面图 -->
      <div style="font-size:14px;font-weight:600;color:#333;margin:16px 0 8px;">封面图</div>
      <div class="upload-area">
        <div v-if="goodForm.img_url" class="img-thumb-wrap">
          <img :src="goodForm.img_url" class="upload-thumb">
          <div class="upload-remove" @click="goodForm.img_url=''">&times;</div>
        </div>
        <label class="upload-add">
          +
          <input type="file" accept="image/*" style="display:none" @change="e => uploadCover(e)">
        </label>
      </div>

      <!-- 商品简介 -->
      <div style="font-size:14px;font-weight:600;color:#333;margin:16px 0 8px;">商品简介</div>
      <div style="padding:0 16px;">
        <textarea v-model="goodForm.description" placeholder="请输入商品简介文字..." rows="4"
                  style="width:100%;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:14px;resize:vertical;font-family:inherit;outline:none;"></textarea>
      </div>
      <div style="padding:4px 16px;font-size:12px;color:#999;">简介图片（最多9张）</div>
      <div class="upload-area">
        <div v-for="(img, i) in goodForm.detailImages" :key="i" class="img-thumb-wrap">
          <img :src="img" class="upload-thumb">
          <div class="upload-remove" @click="removeDetailImg(i)">&times;</div>
        </div>
        <label v-if="goodForm.detailImages.length < 9" class="upload-add">
          +
          <input type="file" accept="image/*" style="display:none" @change="e => uploadDetail(e)">
        </label>
      </div>

      <van-button type="primary" block round style="margin-top:20px;" @click="saveGoodForm" :loading="savingGood">
        {{ isEditGood ? '保存修改' : '创建商品' }}
      </van-button>
    </div>
  </van-popup>
  </template>
</div>

<script>
const WX_APP_ID = 'wx9e7f92a7fad7e40f';
const WX_OAUTH_BASE = 'https://open.weixin.qq.com/connect/oauth2/authorize';
const BASE_URL = 'https://wx.qlc.xn--6qq986b3xl';

async function wxLogin() {
  const token = localStorage.getItem('wx_token');
  if (token) return token;
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (code) {
    const res = await fetch(`/wechat/auth?code=${code}`);
    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('wx_token', data.token);
      params.delete('code'); params.delete('state');
      history.replaceState(null, '', location.pathname + (params.toString() ? '?' + params : ''));
      return data.token;
    }
  }
  const redirectUri = encodeURIComponent(BASE_URL + location.pathname);
  location.href = `${WX_OAUTH_BASE}?appid=${WX_APP_ID}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_base&state=merchant#wechat_redirect`;
}

async function wxJSSDKInit() {
  try {
    const url = location.href.split('#')[0];
    const res = await fetch(`/wechat/jssdk?url=${encodeURIComponent(url)}`);
    if (!res.ok) return;
    const cfg = await res.json();
    wx.config({ debug: false, appId: cfg.appId, timestamp: cfg.timestamp, nonceStr: cfg.nonceStr, signature: cfg.signature, jsApiList: [] });
  } catch (e) { console.warn('JS-SDK 初始化失败:', e); }
}

const { createApp, ref, onMounted, onUnmounted, nextTick } = Vue;

const app = createApp({
  setup() {
    const API = '';
    const TOKEN = () => localStorage.getItem('wx_token') || '';
    const headers = () => ({ 'X-Token': TOKEN(), 'Content-Type': 'application/json' });
    const ready = ref(false);

    async function api(path, opts = {}) {
      const res = await fetch(API + path, { headers: headers(), ...opts });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    const activeTab = ref(0);
    const orders = ref([]);
    const goods = ref([]);
    const currentOrder = ref(null);
    const messages = ref([]);
    const msgInput = ref('');
    const chatBox = ref(null);
    let pollTimer = null;

    // 商品表单
    const showGoodForm = ref(false);
    const isEditGood = ref(false);
    const savingGood = ref(false);
    const goodForm = ref({ id: 0, title: '', description: '', priceYuan: '', originalPriceYuan: '', duration: '60', sales: '0', img_url: '', detailImages: [] });

    function emptyGoodForm() {
      return { id: 0, title: '', description: '', priceYuan: '', originalPriceYuan: '', duration: '60', sales: '0', img_url: '', detailImages: [] };
    }

    async function uploadImage(file) {
      const formData = new FormData();
      formData.append('file', file);
      const res = await fetch('/upload', { method: 'POST', headers: { 'X-Token': TOKEN() }, body: formData });
      if (!res.ok) throw new Error('上传失败');
      const data = await res.json();
      return data.url;
    }
    async function uploadCover(e) {
      const file = e.target.files[0];
      if (!file) return;
      try {
        vant.showToast({ message: '上传中...', forbidClick: true, duration: 0 });
        goodForm.value.img_url = await uploadImage(file);
        vant.closeToast();
      } catch (err) { vant.showToast('上传失败'); }
      e.target.value = '';
    }
    async function uploadDetail(e) {
      const file = e.target.files[0];
      if (!file) return;
      try {
        vant.showToast({ message: '上传中...', forbidClick: true, duration: 0 });
        const url = await uploadImage(file);
        goodForm.value.detailImages.push(url);
        vant.closeToast();
      } catch (err) { vant.showToast('上传失败'); }
      e.target.value = '';
    }
    function removeDetailImg(i) {
      goodForm.value.detailImages.splice(i, 1);
    }

    async function loadOrders() { orders.value = await api('/orders/active'); }
    async function loadGoods() { goods.value = await api('/goods/all'); }
    async function loadChat(orderId) {
      messages.value = await api(`/chat/${orderId}?after_id=0`);
      await nextTick();
      if (chatBox.value) chatBox.value.scrollTop = chatBox.value.scrollHeight;
    }
    async function pollChat() {
      if (!currentOrder.value) return;
      const lastId = messages.value.length ? messages.value[messages.value.length - 1].id : 0;
      const newMsgs = await api(`/chat/${currentOrder.value.id}?after_id=${lastId}`);
      if (newMsgs.length) {
        messages.value.push(...newMsgs);
        await nextTick();
        if (chatBox.value) chatBox.value.scrollTop = chatBox.value.scrollHeight;
      }
    }

    function openChat(order) { currentOrder.value = order; activeTab.value = 1; loadChat(order.id); }
    async function acceptOrder(id) { await api(`/orders/${id}/accept`, { method: 'POST' }); vant.showToast('已接单'); loadOrders(); }
    async function completeOrder(id) { await api(`/orders/${id}/complete`, { method: 'POST' }); vant.showToast('已完成'); loadOrders(); }
    async function sendMessage() {
      if (!msgInput.value.trim() || !currentOrder.value) return;
      await api('/chat', { method: 'POST', body: JSON.stringify({ order_id: currentOrder.value.id, content: msgInput.value }) });
      msgInput.value = '';
      await pollChat();
    }

    // ---- 商品管理 ----
    function openCreateGood() {
      isEditGood.value = false;
      goodForm.value = emptyGoodForm();
      showGoodForm.value = true;
    }
    function openEditGood(g) {
      isEditGood.value = true;
      let detailImages = [];
      try { detailImages = JSON.parse(g.detail_images || '[]'); } catch {}
      goodForm.value = {
        id: g.id,
        title: g.title,
        description: g.description,
        priceYuan: g.price ? String(g.price / 100) : '',
        originalPriceYuan: g.original_price ? String(g.original_price / 100) : '',
        duration: String(g.duration),
        sales: String(g.sales || 0),
        img_url: g.img_url,
        detailImages,
      };
      showGoodForm.value = true;
    }
    async function saveGoodForm() {
      savingGood.value = true;
      try {
        const f = goodForm.value;
        const payload = {
          title: f.title,
          description: f.description,
          price: Math.round(Number(f.priceYuan) * 100),
          original_price: f.originalPriceYuan ? Math.round(Number(f.originalPriceYuan) * 100) : 0,
          duration: Number(f.duration),
          img_url: f.img_url,
          sales: Number(f.sales || 0),
          detail_images: JSON.stringify(f.detailImages),
        };
        if (isEditGood.value) {
          await api(`/goods/${f.id}`, { method: 'PUT', body: JSON.stringify(payload) });
          vant.showToast('已保存');
        } else {
          await api('/goods', { method: 'POST', body: JSON.stringify(payload) });
          vant.showToast('创建成功');
        }
        showGoodForm.value = false;
        loadGoods();
      } finally {
        savingGood.value = false;
      }
    }
    async function toggleGood(g) {
      await api(`/goods/${g.id}`, { method: 'PUT', body: JSON.stringify({ is_active: !g.is_active }) });
      vant.showToast(g.is_active ? '已下架' : '已上架');
      loadGoods();
    }
    function confirmDeleteGood(g) {
      vant.showConfirmDialog({ title: '确认删除', message: `删除商品「${g.title}」？此操作不可恢复。` })
        .then(() => deleteGood(g.id))
        .catch(() => {});
    }
    async function deleteGood(id) {
      await api(`/goods/${id}`, { method: 'DELETE' });
      vant.showToast('已删除');
      loadGoods();
    }

    function statusText(s) { return ['待支付','待接单','已接单','已完成'][s]; }
    function statusColor(s) { return ['#999','#ff9800','#07c160','#999'][s]; }
    function roleLabel(r) { return { CUSTOMER:'客户', MERCHANT:'商家', SERVICE:'客服' }[r] || r; }

    onMounted(async () => {
      try {
        await wxLogin();
        ready.value = true;
        wxJSSDKInit();
        loadOrders(); loadGoods();
        pollTimer = setInterval(() => { loadOrders(); pollChat(); }, 5000);
      } catch (e) { console.error('登录失败:', e); }
    });
    onUnmounted(() => clearInterval(pollTimer));

    return {
      ready, activeTab, orders, goods, currentOrder, messages, msgInput, chatBox,
      showGoodForm, isEditGood, savingGood, goodForm,
      openChat, acceptOrder, completeOrder, sendMessage,
      openCreateGood, openEditGood, saveGoodForm, toggleGood, confirmDeleteGood,
      uploadCover, uploadDetail, removeDetailImg,
      statusText, statusColor, roleLabel
    };
  }
});

app.use(vant);
app.mount('#app');
</script>
</body>
</html>
