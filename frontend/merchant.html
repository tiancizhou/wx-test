<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>商家管理</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css">
<script src="https://fastly.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f6f2eb;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  -webkit-font-smoothing: antialiased;
}
:root {
  --bg-primary: #f6f2eb;
  --bg-card: #fbf8f2;
  --bg-card-hover: #f1ece2;
  --bg-input: #fffdf8;
  --bg-chat: #f6f2eb;
  --bg-bar: #f7f4ee;
  --accent: #556a61;
  --accent-soft: rgba(85, 106, 97, 0.1);
  --text-title: #161514;
  --text-body: #4d4943;
  --text-secondary: #7d786f;
  --border: #d8d2c6;
  --border-strong: #bdb4a4;
  --shadow-soft: 0 18px 40px rgba(24, 21, 16, 0.04);
  --success: #556a61;
  --warning: #877252;
  --danger: #8d635a;
  --info: #6c7d88;
}
@keyframes fadeRise {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.loading-mask {
  position: fixed;
  inset: 0;
  background: var(--bg-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.page-section { padding-bottom: 60px; }
.stack-sm > * + * { margin-top: 8px; }
.row-between { display: flex; justify-content: space-between; align-items: center; }
.title-strong { font-weight: 600; color: var(--text-title); }
.title-strong.ellipsis {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.auto-end { margin-left: auto; }
.title-main { font-size: 16px; font-weight: 600; color: var(--text-title); }
.subtitle-main { margin-top: 8px; font-size: 14px; line-height: 1.8; color: var(--text-body); max-width: 40rem; }
.meta-sm { font-size: 12px; color: var(--text-secondary); }
.meta-sm.strike { text-decoration: line-through; }
.meta-sm.push-right { margin-left: auto; }
.meta-body { font-size: 13px; color: var(--text-body); }
.meta-body.top-gap { margin-top: 6px; }
.meta-sm.top-gap { margin-top: 2px; }
.meta-sm.top-gap-lg { margin-top: 6px; }
.metric-price {
  color: var(--text-title);
  font-size: 18px;
  font-weight: 600;
  font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
}
.metric-price.sm { font-size: 17px; }
.metric-price.top-gap { margin-top: 4px; }
.qty-note { font-size: 12px; color: var(--text-secondary); margin-left: 4px; }
.content-grow { flex: 1; }
.content-grow.min { min-width: 0; }
.title-15 { font-size: 15px; }
.title-14 {
  font-size: 14px;
  color: var(--text-title);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.inline-flex-start {
  display: flex;
  align-items: center;
  gap: 14px;
}
.inline-row-gap {
  display: flex;
  gap: 8px;
}
.inline-row-gap.center { align-items: center; }
.inline-row-gap.md { gap: 10px; }
.inline-row-gap.lg { gap: 14px; }
.toolbar-end {
  display: flex;
  align-items: center;
  gap: 14px;
}
.thumb-70 {
  width: 70px;
  height: 70px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
}
.price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 4px;
}
.order-media-row {
  justify-content: flex-start;
  gap: 12px;
}
.section-empty {
  text-align: center;
  padding: 60px 0;
  color: var(--text-secondary);
  font-size: 13px;
}
.section-empty.compact {
  padding: 40px 0;
}
.popup-panel { padding: 20px; }
.popup-panel.scrollable {
  max-height: 60vh;
  overflow-y: auto;
}
.popup-title { font-size: 16px; font-weight: 600; color: var(--text-title); margin-bottom: 12px; }
.popup-empty { text-align: center; padding: 20px 0; color: var(--text-secondary); font-size: 13px; }
.popup-empty.compact { padding: 40px 0; }
.section-heading {
  padding: 18px 18px 10px;
  font-weight: 600;
  font-size: 16px;
  color: var(--text-title);
}
.hero-block {
  padding: 28px 18px 10px;
  border-bottom: 1px solid rgba(216, 210, 198, 0.92);
  margin-bottom: 10px;
}
.hero-title {
  font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
  font-size: 30px;
  line-height: 1.28;
  color: var(--text-title);
}
.action-bar {
  padding: 0 10px;
  display: flex;
  gap: 8px;
}
.action-bar.stacked-top {
  margin-top: 10px;
}
.btn-fill { flex: 1; }
.detail-status { margin-left: auto; }
.popup-tall { min-height: 80%; }
.stats-item-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 4px;
}
.stats-item-row.full { width: 100%; }
.stats-item-row.space { margin-bottom: 10px; }
.stats-item-label { color: var(--text-body); }
.stats-item-value { color: var(--text-title); font-weight: 500; }
.order-bubble-title { font-weight: 600; }
.order-bubble-meta {
  font-size: 12px;
  margin-top: 4px;
}
.order-bubble-meta.compact { margin-top: 0; }
.order-card {
  background: var(--bg-card);
  margin: 0 18px 14px;
  border-radius: 18px;
  padding: 16px;
  border: 1px solid rgba(216, 210, 198, 0.92);
  box-shadow: var(--shadow-soft);
  animation: fadeRise .55s ease both;
}
.order-card:active { background: var(--bg-card-hover); }
.order-status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  color: var(--text-secondary);
  border: 1px solid currentColor;
  background: transparent;
}
.chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 54px - env(safe-area-inset-bottom)); background: transparent; }
.chat-messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; }
.bubble {
  max-width: min(76%, 34rem);
  padding: 12px 14px;
  border-radius: 18px;
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.68;
  word-break: break-all;
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(216, 210, 198, 0.92);
}
.bubble-left { background: var(--bg-card); align-self: flex-start; color: var(--text-title); }
.bubble-right { background: var(--accent-soft); align-self: flex-end; color: var(--text-title); border-color: rgba(85, 106, 97, 0.18); }
.bubble-role { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
.chat-input-bar {
  display: flex;
  gap: 10px;
  padding: 12px 18px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  background: var(--bg-bar);
  border-top: 1px solid rgba(216, 210, 198, 0.92);
}
.chat-input-bar input { flex: 1; border: 1px solid var(--border); border-radius: 999px; padding: 11px 16px; font-size: 14px; outline: none; background: var(--bg-input); color: var(--text-title); }
.chat-input-bar input::placeholder { color: var(--text-secondary); }
.chat-input-bar button {
  border: 1px solid var(--text-title);
  background: var(--text-title);
  color: #f7f4ed;
  border-radius: 999px;
  padding: 0 18px;
  font-size: 13px;
  font-weight: 600;
}
.detail-header {
  background: var(--bg-bar);
  padding: 14px 18px;
  border-bottom: 1px solid rgba(216, 210, 198, 0.92);
  display: flex;
  align-items: center;
}
.back-arrow { font-size: 20px; cursor: pointer; margin-right: 10px; color: var(--text-title); }
.good-card { background: var(--bg-card); margin: 0 18px 14px; border-radius: 18px; overflow: hidden; border: 1px solid rgba(216, 210, 198, 0.92); box-shadow: var(--shadow-soft); }
.good-card { animation: fadeRise .55s ease both; }
.good-card-top { display: flex; padding: 12px; }
.good-card-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--bg-input); }
.good-card-info { flex: 1; margin-left: 12px; display: flex; flex-direction: column; justify-content: space-between; }
.good-card-bottom { display: flex; border-top: 1px solid var(--border); }
.good-card-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; color: var(--text-secondary); cursor: pointer; border-right: 1px solid var(--border); }
.good-card-btn:last-child { border-right: none; }
.good-card-btn.danger { color: var(--danger); }
.good-card-btn.primary { color: var(--text-title); }
.good-card-btn.success { color: var(--success); }
.unread-dot { flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%; background: var(--text-title); }
.unread-badge { flex-shrink: 0; min-width: 18px; height: 18px; border-radius: 999px; background: var(--text-title); color: #f7f4ed; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
.conv-preview { font-size: 13px; color: var(--text-secondary); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.conv-time { font-size: 11px; color: var(--text-secondary); }
.order-detail-card { background: var(--bg-card); margin: 0 18px 14px; border-radius: 18px; padding: 14px; border: 1px solid rgba(216, 210, 198, 0.92); box-shadow: var(--shadow-soft); }
.order-detail-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-body); margin-top: 6px; }
.order-detail-label { color: var(--text-secondary); }
.order-detail-value { color: var(--text-title); font-weight: 500; }
.bubble-time { font-size: 10px; color: var(--text-secondary); margin-top: 4px; }
.bubble-right .bubble-role { text-align: right; color: var(--accent); }
.bubble-right .bubble-time { text-align: right; color: var(--accent); }
.filter-bar { display: flex; gap: 8px; padding: 12px 18px 8px; overflow-x: auto; }
.filter-tag { flex-shrink: 0; padding: 7px 14px; border-radius: 999px; font-size: 13px; color: var(--text-secondary); background: transparent; border: 1px solid rgba(216, 210, 198, 0.92); cursor: pointer; }
.filter-tag.active { color: #f7f4ed; background: var(--text-title); border-color: var(--text-title); font-weight: 600; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.upload-area { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 16px; }
.upload-thumb { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; position: relative; }
.upload-add { width: 60px; height: 60px; border: 1px dashed var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--text-secondary); cursor: pointer; }
.upload-remove { position: absolute; top: -4px; right: -4px; width: 18px; height: 18px; background: var(--danger); color: #fff; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.img-thumb-wrap { position: relative; display: inline-block; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 18px; }
.stat-card { background: var(--bg-card); border-radius: 18px; padding: 16px; border: 1px solid rgba(216, 210, 198, 0.92); box-shadow: var(--shadow-soft); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 600; color: var(--text-title); font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif; }
.stat-value.small { font-size: 18px; }
.stat-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.stats-hero {
  padding: 28px 18px 18px;
  border-bottom: 1px solid rgba(216, 210, 198, 0.92);
  margin-bottom: 14px;
}
.stats-title {
  font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
  font-size: 30px;
  line-height: 1.3;
  color: var(--text-title);
}
.stats-panel {
  margin: 0 18px 18px;
  padding: 18px 16px;
  border-radius: 22px;
  background: var(--bg-card);
  border: 1px solid rgba(216, 210, 198, 0.92);
  box-shadow: var(--shadow-soft);
  animation: fadeRise .55s ease both;
}
.stats-panel + .stats-panel {
  margin-top: 0;
}
.goods-hero {
  padding: 28px 18px 18px;
  border-bottom: 1px solid rgba(216, 210, 198, 0.92);
  margin-bottom: 14px;
}
.goods-title {
  font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
  font-size: 30px;
  line-height: 1.3;
  color: var(--text-title);
}
.goods-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 16px;
  padding: 0 18px 12px;
}
.goods-head-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-title);
}
.goods-count {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.goods-empty {
  text-align: center;
  padding: 60px 18px;
  color: var(--text-secondary);
  font-size: 13px;
  line-height: 1.8;
}
.merchant-good-index {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.merchant-good-index::before {
  content: "";
  width: 16px;
  height: 1px;
  background: rgba(125, 120, 111, 0.55);
}
.merchant-good-meta {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(216, 210, 198, 0.92);
  font-size: 12px;
  color: var(--text-secondary);
}
.status-inline {
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-inline.active { color: var(--success); }
.status-inline.inactive { color: var(--text-secondary); }
.form-row { display: flex; gap: 10px; margin-bottom: 12px; }
.form-col { flex: 1; }
.form-panel {
  max-height: 90vh;
  overflow-y: auto;
}
.form-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-title);
}
.form-block { margin-bottom: 12px; }
.form-label.tight { margin-bottom: 4px; }
.upload-area.spaced { margin-bottom: 12px; }
.upload-area.spaced-lg { margin-bottom: 16px; }
.textarea-input {
  resize: vertical;
  font-family: inherit;
  margin-bottom: 8px;
}
.hidden-file-input { display: none; }
.popup-panel.scrollable {
  max-height: 60vh;
  overflow-y: auto;
}
.subsection-label {
  padding: 0 0 8px;
  font-size: 13px;
  color: var(--text-secondary);
}
.stats-item-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 4px;
}
.stats-item-row.space { margin-bottom: 10px; }
.stats-item-label { color: var(--text-body); }
.stats-item-value { color: var(--text-title); font-weight: 500; }
.order-bubble-title { font-weight: 600; }
.order-bubble-meta {
  font-size: 12px;
  margin-top: 4px;
}
.order-bubble-meta.compact { margin-top: 0; }
.stat-bar-wrap { margin-top: 6px; }
.stat-bar-bg { height: 8px; border-radius: 4px; background: var(--bg-input); overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.stat-rank-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.stat-rank-item:last-child { border-bottom: none; }
.stat-rank-num { width: 22px; height: 22px; border-radius: 50%; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.stat-rank-num.top { background: var(--text-title); color: #f7f4ed; }
.stat-rank-num.normal { background: var(--bg-input); color: var(--text-secondary); }
.stat-section-title { font-size: 14px; font-weight: 600; color: var(--text-title); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.van-tabbar { background: var(--bg-bar) !important; border-top: 1px solid rgba(216, 210, 198, 0.92) !important; padding-bottom: env(safe-area-inset-bottom) !important; }
.van-tabbar-item--active { color: var(--text-title) !important; }
.van-tabbar-item { color: var(--text-secondary) !important; background: transparent !important; }
.van-button--primary { background: var(--text-title) !important; border-color: var(--text-title) !important; color: #f7f4ed !important; font-weight: 600 !important; }
.van-button--success { background: var(--success) !important; border-color: var(--success) !important; }
.van-button--danger { background: transparent !important; border-color: var(--danger) !important; color: var(--danger) !important; }
.van-button--default { background: var(--bg-card) !important; border-color: var(--border) !important; color: var(--text-title) !important; }
.van-popup--bottom { background: var(--bg-primary) !important; }
.van-popup__content { background: transparent; }
.form-popup { background: transparent; padding: 20px; }
.form-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
.form-input { width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px; font-size: 14px; outline: none; background: var(--bg-input); color: var(--text-title); }
.form-input::placeholder { color: var(--text-secondary); }
.van-cell-group--inset {
  background: var(--bg-card) !important;
  margin: 0 18px !important;
  border-radius: 18px !important;
  overflow: hidden;
  border: 1px solid rgba(216, 210, 198, 0.92);
  box-shadow: var(--shadow-soft);
}
.van-cell { background: var(--bg-card) !important; color: var(--text-body) !important; }
.van-cell::after { border-color: rgba(216, 210, 198, 0.92) !important; }
.van-field__control,
.van-field__control::placeholder { color: var(--text-title) !important; }
.van-field__label { color: var(--text-secondary) !important; }
.error-panel {
  text-align: center;
}
.error-text {
  color: var(--text-body);
  margin-bottom: 16px;
}

@media (min-width: 860px) {
  .stats-story-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  .stat-grid,
  .filter-bar,
  .chat-wrap,
  .good-card,
  .order-card,
  .order-detail-card,
  .stats-hero,
  .stats-panel {
    max-width: 1080px;
    margin-left: auto;
    margin-right: auto;
  }
}
</style>
</head>
<body>
<div id="app">
  <div v-if="!ready" class="loading-mask">
    <van-loading v-if="!loginError" size="36px"></van-loading>
    <div v-else class="error-panel">
      <div class="error-text">登录失败，请重试</div>
      <van-button type="primary" round @click="retryLogin">重新登录</van-button>
    </div>
  </div>

  <template v-else>
  <van-tabbar v-model="activeTab">
    <van-tabbar-item icon="orders-o">订单</van-tabbar-item>
    <van-tabbar-item icon="chat-o" :dot="!!unreadCount">沟通</van-tabbar-item>
    <van-tabbar-item icon="shop-o">商品</van-tabbar-item>
    <van-tabbar-item icon="bar-chart-o">统计</van-tabbar-item>
  </van-tabbar>

  <!-- 订单列表 -->
  <div v-show="activeTab === 0">
    <!-- 订单详情视图 -->
    <div v-if="detailOrder" class="page-section">
      <div class="detail-header">
        <span class="back-arrow" @click="closeOrderDetail">‹</span>
        <span class="title-strong">订单详情</span>
        <span class="order-status detail-status" :style="{color: statusColor(detailOrder.status)}">{{ statusText(detailOrder.status) }}</span>
      </div>
      <!-- 商品信息 -->
      <div class="order-detail-card">
        <div class="inline-flex-start order-media-row">
          <img v-if="detailOrder.good_img_url" :src="detailOrder.good_img_url" class="thumb-70">
          <div class="content-grow min stack-sm">
            <div class="title-strong title-15">{{ detailOrder.good_title || '商品' }}</div>
            <div class="meta-sm">{{ detailOrder.good_duration }}分钟</div>
            <div class="price-row">
              <span class="metric-price">¥{{ formatPrice(detailOrder.total_fee) }}</span>
              <span v-if="detailOrder.quantity > 1" class="qty-note">x{{ detailOrder.quantity }}</span>
            </div>
          </div>
        </div>
      </div>
      <!-- 用户 & 订单信息 -->
      <div class="order-detail-card">
        <div class="order-detail-row"><span class="order-detail-label">订单号</span><span class="order-detail-value meta-sm">{{ detailOrder.id }}</span></div>
        <div class="order-detail-row"><span class="order-detail-label">下单时间</span><span class="order-detail-value">{{ formatTime(detailOrder.create_time) }}</span></div>

<script>
// ---- 前端配置 ----
let WX_APP_ID = '';
let BASE_URL = 'https://wx.qlc.xn--6qq986b3xl';
const WX_OAUTH_BASE = 'https://open.weixin.qq.com/connect/oauth2/authorize';

async function initConfig() {
  const res = await fetch('/config/frontend');
  const cfg = await res.json().catch(() => null);
  if (!res.ok) {
    const detail = cfg && typeof cfg.detail === 'string' && cfg.detail.trim()
      ? cfg.detail.trim()
      : '前端配置获取失败';
    throw new Error(detail);
  }
  if (!cfg || typeof cfg.app_id !== 'string' || !cfg.app_id.trim()) {
    throw new Error('WX_APP_ID 未配置');
  }
  WX_APP_ID = cfg.app_id.trim();
  if (cfg.base_url) BASE_URL = cfg.base_url;
}

async function wxLogin() {
  const token = localStorage.getItem('wx_token');
  if (token) return token;
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (code) {
    const res = await fetch(`/wechat/auth?code=${code}`);
    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('wx_token', data.token);
      params.delete('code'); params.delete('state');
      history.replaceState(null, '', location.pathname + (params.toString() ? '?' + params : ''));
      return data.token;
    }
  }
  if (!WX_APP_ID) {
    throw new Error('WX_APP_ID 未配置');
  }
  const redirectUri = encodeURIComponent(BASE_URL + location.pathname);
  location.href = `${WX_OAUTH_BASE}?appid=${WX_APP_ID}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_userinfo&state=merchant#wechat_redirect`;
}

async function wxJSSDKInit() {
  try {
    const url = location.href.split('#')[0];
    const res = await fetch(`/wechat/jssdk?url=${encodeURIComponent(url)}`);
    if (!res.ok) return;
    const cfg = await res.json();
    wx.config({ debug: false, appId: cfg.appId, timestamp: cfg.timestamp, nonceStr: cfg.nonceStr, signature: cfg.signature, jsApiList: [] });
  } catch (e) { console.warn('JS-SDK 初始化失败:', e); }
}

const { createApp, ref, computed, watch, onMounted, onUnmounted, nextTick } = Vue;

const app = createApp({
  setup() {
    const API = '';
    const TOKEN = () => localStorage.getItem('wx_token') || '';
    const headers = () => ({ 'X-Token': TOKEN(), 'Content-Type': 'application/json' });

    const ready = ref(false);
    const loginError = ref(false);
    const actionLoading = ref(false);
    const activeTab = ref(0);

    const orders = ref([]);
    const ordersLoaded = ref(false);
    const ordersLoading = ref(false);
    const goods = ref([]);
    const goodsLoaded = ref(false);
    const goodsLoading = ref(false);
    const detailOrder = ref(null);
    const conversations = ref([]);
    const conversationsLoaded = ref(false);
    const conversationsLoading = ref(false);
    const currentConversation = ref(null);
    const messages = ref([]);
    const messagesLoading = ref(false);
    const msgInput = ref('');
    const chatBox = ref(null);
    const merchantContacts = ref([]);
    const merchantContactsLoaded = ref(false);
    const merchantContactsLoading = ref(false);
    const conversationWorkspaceLoading = ref(false);
    const showContactPicker = ref(false);
    const showOrderPicker = ref(false);
    const stats = ref(null);
    const statsLoaded = ref(false);
    const statsLoading = ref(false);

    const orderFilter = ref(null);
    const filteredOrders = computed(() => {
      if (orderFilter.value === null) return orders.value;
      return orders.value.filter(order => order.status === orderFilter.value);
    });
    const conversationOrders = computed(() => {
      if (!currentConversation.value) return [];
      return orders.value.filter(order =>
        order.customer_id === currentConversation.value.customer_id &&
        order.status >= 1
      );
    });
    const unreadCount = computed(() => conversations.value.reduce((sum, item) => sum + (item.unread_count || 0), 0));
    const statusDistList = computed(() => {
      if (!stats.value) return [];
      const dist = stats.value.status_dist || {};
      const total = Object.values(dist).reduce((a, b) => a + b, 0) || 1;
      const items = [
        { key: 'ordered', label: '已下单', color: '#877252' },
        { key: 'completed', label: '已完成', color: '#556a61' },
        { key: 'refunding', label: '退款中', color: '#7f7153' },
        { key: 'refunded', label: '已退款', color: '#8d635a' },
      ];
      return items.filter(item => dist[item.key]).map(item => ({
        ...item,
        count: dist[item.key],
        pct: Math.round((dist[item.key] / total) * 100),
      }));
    });

    const showGoodForm = ref(false);
    const isEditGood = ref(false);
    const savingGood = ref(false);
    const goodForm = ref({ id: 0, title: '', description: '', priceYuan: '', originalPriceYuan: '', duration: '60', sales: '0', img_url: '', detailImages: [] });
    const coverUploading = ref(false);
    const detailUploadingCount = ref(0);
    const IMAGE_COMPRESS_THRESHOLD = 120 * 1024;
    const IMAGE_MAX_DIMENSION = 1280;
    const IMAGE_QUALITY = 0.76;
    const IMAGE_TARGET_BYTES = 450 * 1024;
    const uploadPending = computed(() => coverUploading.value || detailUploadingCount.value > 0);

    let pollTimer = null;

    function emptyGoodForm() {
      return { id: 0, title: '', description: '', priceYuan: '', originalPriceYuan: '', duration: '60', sales: '0', img_url: '', detailImages: [] };
    }

    function deferNonCriticalLoad(task) {
      const run = () => Promise.resolve().then(task).catch(error => {
        console.warn('deferred merchant load failed:', error);
      });
      if (typeof window.requestIdleCallback === 'function') {
        window.requestIdleCallback(() => run(), { timeout: 1200 });
      } else {
        window.setTimeout(run, 0);
      }
    }

    function createDeferredLoader(loadFn, loadedRef, loadingRef) {
      let pending = null;
      return async force => {
        if (pending) return pending;
        if (loadedRef.value && !force) return;
        loadingRef.value = true;
        pending = Promise.resolve(loadFn());
        try {
          await pending;
          loadedRef.value = true;
        } finally {
          loadingRef.value = false;
          pending = null;
        }
      };
    }

    async function api(path, opts = {}) {
      const res = await fetch(API + path, { headers: headers(), ...opts });
      if (res.status === 401) {
        localStorage.removeItem('wx_token');
        localStorage.removeItem('wx_last_role');
        location.reload();
        throw new Error('登录已过期');
      }
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function formatPrice(fen) {
      return (Number(fen || 0) / 100).toFixed(2);
    }

    function isNearBottom(el) {
      return el.scrollHeight - el.scrollTop - el.clientHeight < 100;
    }

    function scrollChatToBottom(force = false) {
      if (!chatBox.value) return;
      if (force || isNearBottom(chatBox.value)) {
        chatBox.value.scrollTop = chatBox.value.scrollHeight;
      }
    }

    function imageExtensionForType(type) {
      return {
        'image/jpeg': 'jpg',
        'image/webp': 'webp',
      }[type] || 'jpg';
    }

    function replaceExtension(name, ext) {
      const dot = name.lastIndexOf('.');
      if (dot === -1) return `${name}.${ext}`;
      return `${name.slice(0, dot)}.${ext}`;
    }

    async function compressImageFile(file) {
      if (!file || !file.type.startsWith('image/')) return file;
      if (file.type === 'image/gif' || file.type === 'image/svg+xml') return file;
      if (file.size <= IMAGE_COMPRESS_THRESHOLD) return file;

      const objectUrl = URL.createObjectURL(file);
      try {
        const img = await new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error('图片读取失败'));
          image.src = objectUrl;
        });

        const width = img.naturalWidth || img.width;
        const height = img.naturalHeight || img.height;
        const scale = Math.min(1, IMAGE_MAX_DIMENSION / Math.max(width, height));
        const targetWidth = Math.max(1, Math.round(width * scale));
        const targetHeight = Math.max(1, Math.round(height * scale));

        const canvas = document.createElement('canvas');
        canvas.width = targetWidth;
        canvas.height = targetHeight;
        const ctx = canvas.getContext('2d');
        if (!ctx) return file;

        let blob = null;
        let quality = IMAGE_QUALITY;
        let workWidth = targetWidth;
        let workHeight = targetHeight;
        for (let attempt = 0; attempt < 4; attempt++) {
          if (attempt > 0) {
            workWidth = Math.max(1, Math.round(workWidth * 0.88));
            workHeight = Math.max(1, Math.round(workHeight * 0.88));
            canvas.width = workWidth;
            canvas.height = workHeight;
          }
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
          if (!blob) return file;
          if (blob.size <= IMAGE_TARGET_BYTES) break;
          quality = Math.max(0.58, quality - 0.08);
        }
        if (!blob) return file;
        if (blob.size >= file.size * 0.92) return file;

        return new File(
          [blob],
          replaceExtension(file.name || 'upload.jpg', imageExtensionForType('image/jpeg')),
          { type: 'image/jpeg', lastModified: file.lastModified }
        );
      } finally {
        URL.revokeObjectURL(objectUrl);
      }
    }

    async function uploadImage(file) {
      const preparedFile = await compressImageFile(file);
      const formData = new FormData();
      formData.append('file', preparedFile);
      const res = await fetch('/upload', { method: 'POST', headers: { 'X-Token': TOKEN() }, body: formData });
      if (!res.ok) throw new Error('上传失败');
      const data = await res.json();
      return data.url;
    }

    async function uploadCover(e) {
      const file = e.target.files[0];
      if (!file) return;
      const localPreview = URL.createObjectURL(file);
      const previousUrl = goodForm.value.img_url;
      goodForm.value.img_url = localPreview;
      coverUploading.value = true;
      try {
        vant.showToast({ message: '处理中...', forbidClick: true, duration: 0 });
        goodForm.value.img_url = await uploadImage(file);
        vant.closeToast();
      } catch {
        goodForm.value.img_url = previousUrl;
        vant.showToast('上传失败');
      } finally {
        coverUploading.value = false;
        URL.revokeObjectURL(localPreview);
      }
      e.target.value = '';
    }

    async function uploadDetail(e) {
      const file = e.target.files[0];
      if (!file) return;
      const localPreview = URL.createObjectURL(file);
      const insertIndex = goodForm.value.detailImages.length;
      goodForm.value.detailImages.push(localPreview);
      detailUploadingCount.value += 1;
      try {
        vant.showToast({ message: '处理中...', forbidClick: true, duration: 0 });
        const url = await uploadImage(file);
        goodForm.value.detailImages.splice(insertIndex, 1, url);
        vant.closeToast();
      } catch {
        goodForm.value.detailImages.splice(insertIndex, 1);
        vant.showToast('上传失败');
      } finally {
        detailUploadingCount.value = Math.max(0, detailUploadingCount.value - 1);
        URL.revokeObjectURL(localPreview);
      }
      e.target.value = '';
    }

    function removeDetailImg(index) {
      goodForm.value.detailImages.splice(index, 1);
    }

    async function loadOrders() {
      try {
        orders.value = await api('/orders/active');
      } catch (e) {
        console.error('loadOrders:', e);
      }
    }

    async function loadGoods() {
      try {
        goods.value = await api('/goods/all');
      } catch (e) {
        console.error('loadGoods:', e);
      }
    }

    async function loadStats() {
      try {
        stats.value = await api('/stats/dashboard');
      } catch (e) {
        console.error('loadStats:', e);
      }
    }

    async function loadConversations() {
      try {
        const list = await api('/merchant/conversations');
        conversations.value = list;
        if (currentConversation.value) {
          const next = list.find(item => item.conversation_id === currentConversation.value.conversation_id);
          if (next) currentConversation.value = { ...currentConversation.value, ...next };
        }
      } catch (e) {
        console.error('loadConversations:', e);
      }
    }

    async function loadMerchantContacts() {
      try {
        merchantContacts.value = await api('/merchant-contacts');
      } catch (e) {
        console.error('loadMerchantContacts:', e);
      }
    }

    const runOrdersLoad = createDeferredLoader(loadOrders, ordersLoaded, ordersLoading);
    const runGoodsLoad = createDeferredLoader(loadGoods, goodsLoaded, goodsLoading);
    const runStatsLoad = createDeferredLoader(loadStats, statsLoaded, statsLoading);
    const runConversationsLoad = createDeferredLoader(
      loadConversations,
      conversationsLoaded,
      conversationsLoading
    );
    const runMerchantContactsLoad = createDeferredLoader(
      loadMerchantContacts,
      merchantContactsLoaded,
      merchantContactsLoading
    );

    async function ensureOrdersLoaded(force = false) {
      await runOrdersLoad(force);
    }

    async function ensureGoodsLoaded(force = false) {
      await runGoodsLoad(force);
    }

    async function ensureStatsLoaded(force = false) {
      await runStatsLoad(force);
    }

    async function ensureConversationsLoaded(force = false) {
      await runConversationsLoad(force);
    }

    async function ensureMerchantContactsLoaded(force = false) {
      await runMerchantContactsLoad(force);
    }

    async function ensureConversationWorkspaceReady(force = false) {
      conversationWorkspaceLoading.value = true;
      try {
        await Promise.all([
          ensureConversationsLoaded(force),
          ensureMerchantContactsLoaded(force),
        ]);
      } finally {
        conversationWorkspaceLoading.value = false;
      }
    }

    async function warmMerchantDeferredData() {
      await Promise.all([
        ensureGoodsLoaded(),
        ensureStatsLoaded(),
        ensureConversationWorkspaceReady(),
      ]);
    }

    async function openConversation(conv) {
      messagesLoading.value = true;
      currentConversation.value = { ...conv };
      try {
        messages.value = await api(`/merchant/conversations/${conv.conversation_id}/messages?after_id=0`);
        if (messages.value.length) {
          await api(`/merchant/conversations/${conv.conversation_id}/read`, {
            method: 'POST',
            body: JSON.stringify({ last_message_id: messages.value[messages.value.length - 1].id }),
          });
          currentConversation.value.unread_count = 0;
          const idx = conversations.value.findIndex(item => item.conversation_id === conv.conversation_id);
          if (idx >= 0) conversations.value[idx] = { ...conversations.value[idx], unread_count: 0 };
        }
        await nextTick();
        scrollChatToBottom(true);
      } finally {
        messagesLoading.value = false;
      }
    }

    function closeConversation() {
      currentConversation.value = null;
      messages.value = [];
      msgInput.value = '';
      showOrderPicker.value = false;
    }

    async function sendMessage() {
      if (!msgInput.value.trim() || !currentConversation.value) return;
      try {
        const sent = await api(`/merchant/conversations/${currentConversation.value.conversation_id}/messages`, {
          method: 'POST',
          body: JSON.stringify({ message_type: 'text', content: msgInput.value }),
        });
        msgInput.value = '';
        messages.value.push(sent);
        await ensureConversationsLoaded(true);
        await nextTick();
        scrollChatToBottom(true);
      } catch (e) {
        vant.showToast((e.message || '发送失败').replace(/^Error:\s*/, ''));
      }
    }

    async function sendOrderCard(order) {
      if (!currentConversation.value) return;
      try {
        const sent = await api(`/merchant/conversations/${currentConversation.value.conversation_id}/messages`, {
          method: 'POST',
          body: JSON.stringify({ message_type: 'order_card', order_id: order.id }),
        });
        messages.value.push(sent);
        showOrderPicker.value = false;
        await ensureConversationsLoaded(true);
        await nextTick();
        scrollChatToBottom(true);
      } catch (e) {
        vant.showToast((e.message || '发送失败').replace(/^Error:\s*/, ''));
      }
    }

    async function switchConversationContact(contact) {
      if (!currentConversation.value) return;
      const updated = await api(`/merchant/conversations/${currentConversation.value.conversation_id}/default-contact`, {
        method: 'POST',
        body: JSON.stringify({ merchant_contact_id: contact.id }),
      });
      currentConversation.value = { ...currentConversation.value, ...updated };
      const idx = conversations.value.findIndex(item => item.conversation_id === updated.conversation_id);
      if (idx >= 0) conversations.value[idx] = { ...conversations.value[idx], ...updated };
      showContactPicker.value = false;
    }

    async function pollConversationMessages() {
      if (!currentConversation.value) return;
      const lastId = messages.value.length ? messages.value[messages.value.length - 1].id : 0;
      const newer = await api(`/merchant/conversations/${currentConversation.value.conversation_id}/messages?after_id=${lastId}`);
      if (newer.length) {
        messages.value.push(...newer);
        await api(`/merchant/conversations/${currentConversation.value.conversation_id}/read`, {
          method: 'POST',
          body: JSON.stringify({ last_message_id: messages.value[messages.value.length - 1].id }),
        });
        currentConversation.value.unread_count = 0;
        await ensureConversationsLoaded(true);
        await nextTick();
        scrollChatToBottom(true);
      } else {
        await ensureConversationsLoaded(true);
      }
    }

    function openOrderDetail(order) {
      detailOrder.value = order;
    }

    function closeOrderDetail() {
      detailOrder.value = null;
    }

    async function completeOrder(id) {
      actionLoading.value = true;
      try {
        await api(`/orders/${id}/complete`, { method: 'POST' });
        vant.showToast('已完成');
        await ensureOrdersLoaded(true);
        await ensureStatsLoaded(true);
        detailOrder.value = null;
      } finally {
        actionLoading.value = false;
      }
    }

    async function refundOrderAction(order) {
      try {
        await vant.showConfirmDialog({ title: '确认退款', message: '确认对该订单进行退款？' });
      } catch {
        return;
      }
      actionLoading.value = true;
      try {
        await api(`/pay/refund/${order.id}`, { method: 'POST', body: JSON.stringify({}) });
        vant.showToast('退款申请已提交');
        await ensureOrdersLoaded(true);
        await ensureStatsLoaded(true);
        detailOrder.value = null;
      } catch (e) {
        vant.showToast('退款失败: ' + (e.message || e));
      } finally {
        actionLoading.value = false;
      }
    }

    function openCreateGood() {
      isEditGood.value = false;
      goodForm.value = emptyGoodForm();
      showGoodForm.value = true;
    }

    function openEditGood(good) {
      isEditGood.value = true;
      let detailImages = [];
      try {
        detailImages = JSON.parse(good.detail_images || '[]');
      } catch {}
      goodForm.value = {
        id: good.id,
        title: good.title,
        description: good.description,
        priceYuan: good.price ? String(good.price / 100) : '',
        originalPriceYuan: good.original_price ? String(good.original_price / 100) : '',
        duration: String(good.duration),
        sales: String(good.sales || 0),
        img_url: good.img_url,
        detailImages,
      };
      showGoodForm.value = true;
    }

    async function saveGoodForm() {
      const form = goodForm.value;
      if (!form.title.trim()) {
        vant.showToast('请输入商品名称');
        return;
      }
      if (!form.priceYuan || Number(form.priceYuan) <= 0) {
        vant.showToast('请输入有效价格');
        return;
      }
      if (uploadPending.value) {
        vant.showToast('图片处理中，请稍候');
        return;
      }
      savingGood.value = true;
      try {
        const payload = {
          title: form.title,
          description: form.description,
          price: Math.round(Number(form.priceYuan) * 100),
          original_price: form.originalPriceYuan ? Math.round(Number(form.originalPriceYuan) * 100) : 0,
          duration: Number(form.duration),
          img_url: form.img_url,
          sales: Number(form.sales || 0),
          detail_images: JSON.stringify(form.detailImages),
        };
        if (isEditGood.value) {
          await api(`/goods/${form.id}`, { method: 'PUT', body: JSON.stringify(payload) });
          vant.showToast('已保存');
        } else {
          await api('/goods', { method: 'POST', body: JSON.stringify(payload) });
          vant.showToast('创建成功');
        }
        showGoodForm.value = false;
        await ensureGoodsLoaded(true);
      } finally {
        savingGood.value = false;
      }
    }

    async function toggleGood(good) {
      await api(`/goods/${good.id}`, { method: 'PUT', body: JSON.stringify({ is_active: !good.is_active }) });
      vant.showToast(good.is_active ? '已下架' : '已上架');
      await ensureGoodsLoaded(true);
    }

    function confirmDeleteGood(good) {
      vant.showConfirmDialog({ title: '确认删除', message: `删除商品「${good.title}」？此操作不可恢复。` })
        .then(() => deleteGood(good.id))
        .catch(() => {});
    }

    async function deleteGood(id) {
      await api(`/goods/${id}`, { method: 'DELETE' });
      vant.showToast('已删除');
      await ensureGoodsLoaded(true);
    }

    function statusText(status) {
      return { 0: '待付款', 1: '已下单', 2: '已完成', 3: '退款中', 4: '已退款' }[status] ?? '未知';
    }

    function statusColor(status) {
      return { 0: '#7d786f', 1: '#877252', 2: '#556a61', 3: '#7f7153', 4: '#8d635a' }[status] ?? '#7d786f';
    }

    function formatTime(ts) {
      const d = new Date(Number(ts || 0) * 1000);
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
      if (d.toDateString() === now.toDateString()) return time;
      const yesterday = new Date(now);
      yesterday.setDate(now.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return '昨天 ' + time;
      return `${d.getMonth() + 1}/${d.getDate()} ${time}`;
    }

    function retryLogin() {
      loginError.value = false;
      localStorage.removeItem('wx_token');
      localStorage.removeItem('wx_last_role');
      location.reload();
    }

    async function handlePoll() {
      await ensureOrdersLoaded(true);
      if (activeTab.value === 1 && currentConversation.value && conversationsLoaded.value) {
        await pollConversationMessages();
      } else if (conversationsLoaded.value) {
        await ensureConversationsLoaded(true);
      }
    }

    const handleResize = () => scrollChatToBottom();
    const handleVisibilityChange = () => {
      if (document.hidden) {
        clearInterval(pollTimer);
        pollTimer = null;
      } else if (ready.value) {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(handlePoll, 5000);
        ensureOrdersLoaded(true);
        if (goodsLoaded.value) ensureGoodsLoaded(true);
        if (statsLoaded.value) ensureStatsLoaded(true);
        if (conversationsLoaded.value) ensureConversationsLoaded(true);
      }
    };

    watch(activeTab, async tab => {
      if (tab === 1) {
        await ensureConversationWorkspaceReady();
      } else if (tab === 2) {
        await ensureGoodsLoaded();
      } else if (tab === 3) {
        await ensureStatsLoaded();
      }
    });

    onMounted(async () => {
      try {
        await initConfig();
        await wxLogin();
        localStorage.setItem('wx_last_role', 'MERCHANT');
        await ensureOrdersLoaded();
        ready.value = true;
        loginError.value = false;
        wxJSSDKInit();
        deferNonCriticalLoad(warmMerchantDeferredData);
        pollTimer = setInterval(handlePoll, 5000);
        window.addEventListener('resize', handleResize);
        document.addEventListener('visibilitychange', handleVisibilityChange);
      } catch (e) {
        console.error('登录失败:', e);
        loginError.value = true;
      }
    });

    onUnmounted(() => {
      clearInterval(pollTimer);
      pollTimer = null;
      window.removeEventListener('resize', handleResize);
      document.removeEventListener('visibilitychange', handleVisibilityChange);
    });

    return {
      ready,
      loginError,
      activeTab,
      orders,
      filteredOrders,
      orderFilter,
      conversations,
      conversationWorkspaceLoading,
      currentConversation,
      goods,
      goodsLoading,
      detailOrder,
      messages,
      messagesLoading,
      msgInput,
      chatBox,
      merchantContacts,
      merchantContactsLoading,
      showContactPicker,
      showOrderPicker,
      stats,
      statusDistList,
      actionLoading,
      showGoodForm,
      isEditGood,
      savingGood,
      goodForm,
      openOrderDetail,
      closeOrderDetail,
      openConversation,
      closeConversation,
      completeOrder,
      refundOrderAction,
      sendMessage,
      sendOrderCard,
      switchConversationContact,
      openCreateGood,
      openEditGood,
      saveGoodForm,
      toggleGood,
      confirmDeleteGood,
      uploadCover,
      uploadDetail,
      removeDetailImg,
      unreadCount,
      conversationOrders,
      statusText,
      statusColor,
      formatTime,
      formatPrice,
      retryLogin,
    };
  }
});

app.use(vant);
app.mount('#app');
</script>
</body>
</html>
