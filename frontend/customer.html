<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>到店按摩</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css">
<script src="https://fastly.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-card: #252540;
  --bg-card-hover: #2d2d4a;
  --bg-input: #1e1e36;
  --bg-chat: #12122a;
  --gold: #c9a96e;
  --gold-light: #e0c48a;
  --text-title: #ffffff;
  --text-body: #b0b0c0;
  --text-secondary: #787890;
  --border: #3a3a5c;
  --status-success: #4caf88;
  --status-warning: #d4a03c;
  --status-danger: #c0564a;
  --status-info: #5b8dd9;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-primary); font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text-body); }

/* Loading */
.loading-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 9999; }

/* Product Grid */
.good-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; contain: layout paint; }
.good-card { background: var(--bg-card); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: transform .15s, background-color .15s; }
.good-card:active { transform: scale(.97); background: var(--bg-card-hover); }
.good-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.good-card-info { padding: 10px; }
.good-card-title { font-size: 14px; font-weight: 600; color: var(--text-title); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.good-card-bottom { display: flex; align-items: baseline; justify-content: space-between; margin-top: 6px; }
.good-card-price { color: var(--gold); font-size: 16px; font-weight: 700; }
.good-card-price .unit { font-size: 11px; }
.good-card-original { font-size: 11px; color: var(--text-secondary); text-decoration: line-through; margin-left: 4px; }
.good-card-tag { border: 1px solid var(--gold); color: var(--gold); font-size: 10px; padding: 1px 6px; border-radius: 10px; }
.good-card-meta { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

/* Order */
.order-card { background: var(--bg-card); margin: 10px; border-radius: 10px; padding: 14px; border: 1px solid var(--border); cursor: pointer; }
.order-status { display: inline-block; font-size: 12px; padding: 2px 10px; border-radius: 10px; color: #fff; }
.status-consult { background: #5b8dd9; }
.status-unpaid { background: #787890; }
.status-pending { background: #d4a03c; }
.status-accepted { background: #07c160; }
.status-completed { background: #787890; }
.section-pad-bottom { padding-bottom: 60px; }
.empty-state { text-align: center; padding: 60px 0; color: #787890; font-size: 13px; }
.row-between { display: flex; justify-content: space-between; align-items: center; }
.title-white { font-weight: 600; color: #ffffff; }
.subtle-text { font-size: 13px; color: #b0b0c0; }
.gold-price { color: #c9a96e; font-weight: 600; }
.chat-bubble-col { display: flex; flex-direction: column; }
.meta-time { font-size: 11px; color: #787890; }
.conv-title-row { display: flex; align-items: center; gap: 6px; min-width: 0; }
.conv-title-text { font-weight: 600; color: #ffffff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.consult-badge { flex-shrink: 0; font-size: 10px; border: 1px solid var(--gold); color: var(--gold); padding: 1px 6px; border-radius: 8px; }
.unread-badge { flex-shrink: 0; min-width: 18px; height: 18px; border-radius: 9px; background: #e74c3c; color: #fff; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
.status-badge-sm { font-size: 10px; padding: 1px 8px; }
.time-right { flex-shrink: 0; margin-left: 8px; }
.single-line-preview { font-size: 13px; color: #b0b0c0; margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.order-summary-text { font-size: 13px; color: #b0b0c0; margin-top: 8px; }
.order-price { font-size: 15px; color: #c9a96e; margin-top: 6px; font-weight: 600; }

/* Chat */
.chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 50px - env(safe-area-inset-bottom)); background: var(--bg-chat); contain: layout paint; }
.chat-messages { flex: 1; overflow-y: auto; padding: 10px; contain: layout paint; display: flex; flex-direction: column; }
.bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; line-height: 1.5; word-break: break-all; color: #e0e0e0; }
.bubble-left { background: var(--bg-card-hover); align-self: flex-start; border-bottom-left-radius: 4px; }
.bubble-right { background: #2d5a2d; align-self: flex-end; border-bottom-right-radius: 4px; color: #ffffff; }
.bubble-role { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
.bubble-right .bubble-role { text-align: right; color: #8aad8a; }
.bubble-time { font-size: 10px; color: var(--text-secondary); margin-top: 4px; }
.bubble-right .bubble-time { text-align: right; color: #8aad8a; }
.chat-input-bar { display: flex; padding: 8px 10px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); background: var(--bg-card); border-top: 1px solid var(--border); }
.chat-input-bar input { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; font-size: 14px; outline: none; background: var(--bg-input); color: var(--text-title); }
.chat-input-bar input::placeholder { color: var(--text-secondary); }
.chat-input-bar button { margin-left: 8px; border: none; background: var(--gold); color: var(--bg-primary); border-radius: 20px; padding: 0 20px; font-size: 14px; font-weight: 600; }

/* Detail popup */
.detail-popup { background: var(--bg-primary); }
.detail-popup .detail-title { font-size: 20px; font-weight: 700; color: var(--text-title); }
.detail-popup .detail-price { color: var(--gold); font-size: 26px; font-weight: 700; }
.detail-popup .detail-original { font-size: 14px; color: var(--text-secondary); text-decoration: line-through; }
.detail-popup .detail-meta { font-size: 13px; color: var(--text-secondary); }
.detail-popup .detail-desc { font-size: 14px; color: var(--text-body); line-height: 1.8; white-space: pre-wrap; }
.detail-popup .detail-img { width: 100%; border-radius: 8px; }
.detail-cta { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); background: var(--bg-primary); border-top: 1px solid var(--border); }

/* Booking popup */
.book-popup { background: var(--bg-card); }
.book-popup input[type="tel"] { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; background: var(--bg-input); color: var(--text-title); }
.book-popup input::placeholder { color: var(--text-secondary); }

/* Order detail header */
.detail-header { background: var(--bg-card); padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; contain: layout paint; }
.detail-header .back-arrow { font-size: 20px; cursor: pointer; margin-right: 10px; color: var(--gold); }

/* Product card in order detail (clickable) */
.order-good-card { background: var(--bg-card); padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; cursor: pointer; border-left: 4px solid var(--gold); contain: layout paint; }
.order-good-card:active { background: var(--bg-card-hover); }

/* Appointment info */
.appt-info { background: var(--bg-card); padding: 12px 14px; border-bottom: 1px solid var(--border); contain: layout paint; }
.appt-info .label { color: var(--text-title); }
.appt-info .value { color: var(--text-body); }

/* Profile */
.profile-section { padding: 0 0 60px; contain: layout paint; }
.profile-card { display: flex; align-items: center; gap: 14px; padding: 28px 20px; background: linear-gradient(135deg, #252540, #1e1e36); }
.profile-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), #e0c48a); color: var(--bg-primary); font-size: 22px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.profile-info { min-width: 0; }
.profile-name { font-size: 17px; font-weight: 600; color: var(--text-title); }
.profile-phone { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.profile-stats { display: flex; background: var(--bg-card); margin: 12px 10px; border-radius: 10px; border: 1px solid var(--border); padding: 16px 0; }
.stat-item { flex: 1; text-align: center; cursor: pointer; }
.stat-num { font-size: 20px; font-weight: 700; color: var(--text-title); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.filter-bar { display: flex; gap: 8px; padding: 10px; overflow-x: auto; }
.filter-tag { flex-shrink: 0; padding: 6px 14px; border-radius: 16px; font-size: 13px; color: var(--text-secondary); background: var(--bg-card); border: 1px solid var(--border); cursor: pointer; }
.filter-tag.active { color: var(--bg-primary); background: var(--gold); border-color: var(--gold); font-weight: 600; }

/* Vant dark overrides */
.van-tabbar { background: var(--bg-card) !important; border-top: 1px solid var(--border) !important; padding-bottom: env(safe-area-inset-bottom) !important; }
.van-tabbar-item--active { color: var(--gold) !important; }
.van-tabbar-item { color: var(--text-secondary) !important; background: transparent !important; }
.van-popup--bottom { background: var(--bg-primary) !important; }
.van-button--primary { background: var(--gold) !important; border-color: var(--gold) !important; color: var(--bg-primary) !important; font-weight: 600 !important; }
.van-cell-group--inset { background: var(--bg-card) !important; margin: 0 !important; border-radius: 10px !important; overflow: hidden; }
.van-cell { background: var(--bg-card) !important; color: var(--text-body) !important; }
.van-cell__title { color: var(--text-body) !important; }
.van-cell__value { color: var(--text-title) !important; }
.van-cell::after { border-color: var(--border) !important; }
.van-loading__text { color: var(--gold) !important; }
.van-loading__spinner .van-loading__dot { background: var(--gold) !important; }
</style>
</head>
<body>
<div id="app">
  <!-- 登录加载中 -->
  <div v-if="!ready" class="loading-mask">
    <van-loading v-if="!loginError" size="36px">正在登录...</van-loading>
    <div v-else style="text-align:center;">
      <div style="color:#b0b0c0;margin-bottom:16px;">登录失败，请重试</div>
      <van-button type="primary" round @click="retryLogin">重新登录</van-button>
    </div>
  </div>

  <template v-else>
  <!-- Tab Bar -->
  <van-tabbar v-model="activeTab">
    <van-tabbar-item icon="home-o">首页</van-tabbar-item>
    <van-tabbar-item icon="orders-o">订单</van-tabbar-item>
    <van-tabbar-item icon="chat-o" :dot="!!unreadCount">消息</van-tabbar-item>
    <van-tabbar-item icon="contact">我的</van-tabbar-item>
  </van-tabbar>

  <!-- 首页：商品列表 -->
  <div v-show="activeTab === 0" style="padding-bottom:60px;">
    <div style="background:linear-gradient(180deg,#1a1a2e,#252540);padding:24px 16px 36px;">
      <div style="font-size:22px;font-weight:700;color:#c9a96e;">到店按摩</div>
      <div style="font-size:13px;color:#b0b0c0;margin-top:4px;">匠心技艺 到店体验</div>
      <div style="height:1px;background:linear-gradient(90deg,transparent,#c9a96e,transparent);margin-top:16px;opacity:.4;"></div>
    </div>
    <div class="good-grid">
      <div v-for="g in goods" :key="g.id" class="good-card" @click="openDetail(g)">
        <img :src="g.img_url || 'https://via.placeholder.com/300x170/252540/787890?text=No+Image'" loading="lazy">
        <div class="good-card-info">
          <div class="good-card-title">{{ g.title }}</div>
          <div class="good-card-bottom">
            <div>
              <span class="good-card-price"><span class="unit">¥</span>{{ formatPrice(g.price) }}</span>
              <span class="good-card-original" v-if="g.original_price">¥{{ formatPrice(g.original_price) }}</span>
            </div>
            <span class="good-card-tag">{{ g.duration }}分钟</span>
          </div>
          <div class="good-card-meta">已售 {{ g.sales || 0 }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 订单Tab：列表 / 详情切换 -->
  <div v-show="activeTab === 1">
    <!-- 订单列表视图 -->
    <div v-show="!currentOrder" class="section-pad-bottom">
      <!-- 筛选栏 -->
      <div class="filter-bar">
        <div :class="['filter-tag', orderFilter === null ? 'active' : '']" @click="clearFilter">全部</div>
        <div :class="['filter-tag', orderFilter === 1 ? 'active' : '']" @click="orderFilter = orderFilter === 1 ? null : 1">已下单</div>
        <div :class="['filter-tag', orderFilter === 2 ? 'active' : '']" @click="orderFilter = orderFilter === 2 ? null : 2">已完成</div>
        <div :class="['filter-tag', orderFilter === 3 ? 'active' : '']" @click="orderFilter = orderFilter === 3 ? null : 3">退款中</div>
        <div :class="['filter-tag', orderFilter === 4 ? 'active' : '']" @click="orderFilter = orderFilter === 4 ? null : 4">已退款</div>
      </div>
      <div v-if="!filteredOrders.length" class="empty-state">暂无订单</div>
      <div v-for="o in filteredOrders" :key="o.id" class="order-card" @click="openOrderDetail(o)">
        <div class="row-between">
          <span class="title-white">{{ o.good_title || '商品' }}</span>
          <span :class="['order-status', statusClass(o.status)]">{{ statusText(o.status) }}</span>
        </div>
        <div class="order-summary-text">
          {{ o.phone }} · {{ o.appointment_time }}
        </div>
        <div class="order-price">¥{{ formatPrice(o.total_fee) }}</div>
      </div>
    </div>
    <!-- 订单详情视图 -->
    <div v-if="currentOrder" style="padding-bottom:60px;">
      <div class="detail-header">
        <span class="back-arrow" @click="closeOrderDetail">‹</span>
        <span class="title-white">订单详情</span>
        <span :class="['order-status', statusClass(currentOrder.status)]" style="margin-left:auto;">{{ statusText(currentOrder.status) }}</span>
      </div>
      <!-- 商品信息 -->
      <div class="order-good-card" @click="viewOrderGood(currentOrder)">
        <img v-if="currentOrder.good_img_url" :src="currentOrder.good_img_url" style="width:70px;height:70px;border-radius:8px;object-fit:cover;flex-shrink:0;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:15px;font-weight:600;color:#ffffff;">{{ currentOrder.good_title || '商品' }}</div>
          <div style="font-size:13px;color:#787890;margin-top:2px;">{{ currentOrder.good_duration }}分钟</div>
          <div style="display:flex;align-items:baseline;gap:6px;margin-top:4px;">
            <span style="color:#c9a96e;font-size:16px;font-weight:700;">¥{{ formatPrice(currentOrder.total_fee) }}</span>
          </div>
        </div>
        <span style="color:#c9a96e;align-self:center;font-size:14px;">›</span>
      </div>
      <!-- 预约信息 -->
      <div class="appt-info">
        <div style="font-size:13px;"><span class="label">手机号：</span><span class="value">{{ currentOrder.phone }}</span></div>
        <div style="font-size:13px;margin-top:4px;"><span class="label">预约时间：</span><span class="value">{{ currentOrder.appointment_time }}</span></div>
        <div v-if="currentOrder.quantity > 1" style="font-size:13px;margin-top:4px;"><span class="label">数量：</span><span class="value">{{ currentOrder.quantity }}</span></div>
      </div>
      <!-- 退款按钮 -->
      <div v-if="[1,2].includes(currentOrder.status)" style="padding:0 10px;margin-top:12px;">
        <van-button block round type="danger" size="small" @click="refundOrder(currentOrder)" :loading="submitting">申请退款</van-button>
      </div>
    </div>
  </div>

  <!-- 消息Tab -->
  <div v-show="activeTab === 2">
    <!-- 会话列表 -->
    <div v-show="!activeConv" class="section-pad-bottom">
      <div v-if="!conversations.length" class="empty-state">暂无消息</div>
      <div v-for="c in conversations" :key="c.thread_id" class="order-card" @click="openConversation(c)">
        <div class="row-between">
          <div class="conv-title-row">
            <span v-if="c.unread_count" class="unread-badge">{{ c.unread_count }}</span>
            <span class="conv-title-text">{{ c.good_title }}</span>
            <span v-if="c.thread_type === 'consultation'" class="consult-badge">咨询</span>
            <span v-else :class="['order-status', statusClass(c.status), 'status-badge-sm']">{{ statusText(c.status) }}</span>
          </div>
          <span class="meta-time time-right">{{ formatTime(c.last_time) }}</span>
        </div>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">
          {{ c.thread_type === 'consultation' ? '咨询' : '订单号 ' + c.thread_id.slice(-8) }} · {{ formatTime(c.create_time) }}
        </div>
        <div class="single-line-preview">
          {{ c.last_content }}
        </div>
      </div>
    </div>
    <!-- 聊天视图 -->
    <div v-show="activeConv" class="chat-wrap">
      <div class="detail-header">
        <span class="back-arrow" @click="closeConversation">‹</span>
        <span class="title-white">{{ activeConv?.good_title }}</span>
      </div>
      <div class="chat-messages" ref="convChatBox">
        <div v-if="!convMessages.length" class="empty-state" style="padding:40px 0;">暂无消息</div>
        <div v-for="m in convMessages" :key="m.id"
             :class="['bubble', 'chat-bubble-col', m.sender_role === user.role ? 'bubble-right' : 'bubble-left']">
          <div v-if="m.sender_role !== user.role" class="bubble-role">{{ roleLabel(m.sender_role) }}</div>
          <div>{{ m.content }}</div>
          <div class="bubble-time">{{ formatTime(m.create_time) }}</div>
        </div>
      </div>
      <div class="chat-input-bar">
        <input v-model="convMsgInput" placeholder="输入消息..." @keyup.enter="sendConvMessage">
        <button @click="sendConvMessage">发送</button>
      </div>
    </div>
  </div>

  <!-- 我的 -->
  <div v-show="activeTab === 3" class="profile-section">
    <!-- 个人信息卡片 -->
    <div class="profile-card">
      <div class="profile-avatar">{{ (user.nickname || '用')[0] }}</div>
      <div class="profile-info">
        <div class="profile-name">{{ user.nickname || '未设置昵称' }}</div>
        <div class="profile-phone">{{ user.phone || '未绑定手机号' }}</div>
      </div>
    </div>
    <!-- 订单统计 -->
    <div class="profile-stats">
      <div class="stat-item" @click="goToOrders(1)">
        <div class="stat-num">{{ orderStats.ordered }}</div>
        <div class="stat-label">已下单</div>
      </div>
      <div class="stat-item" @click="goToOrders(2)">
        <div class="stat-num">{{ orderStats.completed }}</div>
        <div class="stat-label">已完成</div>
      </div>
    </div>
    <!-- 快捷功能 -->
    <van-cell-group inset style="margin-top:12px;">
      <van-cell title="联系商家" is-link @click="contactMerchant" />
    </van-cell-group>
  </div>

  <!-- 商品详情弹窗 -->
  <van-popup v-model:show="showDetail" position="bottom" round :style="{ minHeight: '70%' }">
    <div class="detail-popup" style="max-height:85vh;overflow-y:auto;">
      <div v-if="detailGood" style="padding-bottom:80px;">
        <img :src="detailGood.img_url" style="width:100%;max-height:300px;object-fit:cover;">
        <div style="padding:16px;">
          <div class="detail-title">{{ detailGood.title }}</div>
          <div style="display:flex;align-items:baseline;gap:8px;margin-top:8px;">
            <span class="detail-price">¥{{ formatPrice(detailGood.price) }}</span>
            <span v-if="detailGood.original_price" class="detail-original">¥{{ formatPrice(detailGood.original_price) }}</span>
            <span class="detail-meta" style="margin-left:auto;">已售 {{ detailGood.sales || 0 }} · {{ detailGood.duration }}分钟</span>
          </div>
          <div class="detail-desc" style="margin-top:16px;">{{ detailGood.description }}</div>
          <div v-if="detailImages.length" style="margin-top:16px;">
            <div v-for="(img, i) in detailImages" :key="i" style="margin-bottom:8px;">
              <img :src="img" class="detail-img" @click="previewImage(i)">
            </div>
          </div>
        </div>
        <div class="detail-cta" style="display:flex;gap:10px;">
          <van-button style="flex:1;" round plain @click="startConsult(detailGood)">咨询商家</van-button>
          <van-button type="primary" style="flex:2;" round @click="showDetail=false;openBook(detailGood)">立即下单 · ¥{{ formatPrice(detailGood.price) }}</van-button>
        </div>
      </div>
    </div>
  </van-popup>

  <!-- 联系商家弹窗 -->
  <van-popup v-model:show="showContact" position="bottom" round :style="{ minHeight: '30%' }">
    <div style="padding:24px 20px;">
      <div style="font-size:16px;font-weight:600;color:#ffffff;margin-bottom:20px;">联系商家</div>
      <div v-if="contactInfo.wechat" style="margin-bottom:16px;">
        <div style="font-size:13px;color:#b0b0c0;margin-bottom:4px;">微信号</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:15px;color:#ffffff;">{{ contactInfo.wechat }}</span>
          <van-button size="mini" type="primary" @click="copyText(contactInfo.wechat)">复制</van-button>
        </div>
      </div>
      <div v-if="contactInfo.phone" style="margin-bottom:16px;">
        <div style="font-size:13px;color:#b0b0c0;margin-bottom:4px;">手机号</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:15px;color:#ffffff;">{{ contactInfo.phone }}</span>
          <van-button size="mini" type="primary" @click="copyText(contactInfo.phone)">复制</van-button>
        </div>
      </div>
      <div v-if="!contactInfo.wechat && !contactInfo.phone" style="text-align:center;color:#787890;padding:20px 0;">暂未配置联系方式</div>
    </div>
  </van-popup>

  <!-- 下单弹窗 -->
  <van-popup v-model:show="showBook" position="bottom" round :style="{ minHeight: '50%' }">
    <div class="book-popup" style="padding:20px;">
      <div style="font-size:16px;font-weight:600;margin-bottom:16px;color:#ffffff;">下单 {{ bookGood?.title }}</div>
      <div style="margin-bottom:12px;">
        <div style="font-size:13px;color:#b0b0c0;margin-bottom:4px;">手机号 *</div>
        <input v-model="bookForm.phone" type="tel" placeholder="请输入手机号">
      </div>
      <div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:13px;color:#b0b0c0;">数量</span>
        <div style="display:flex;align-items:center;gap:12px;">
          <div @click="bookForm.quantity = Math.max(1, bookForm.quantity - 1)" style="width:28px;height:28px;border-radius:14px;border:1px solid #3a3a5c;display:flex;align-items:center;justify-content:center;color:#b0b0c0;font-size:16px;cursor:pointer;">-</div>
          <span style="font-size:16px;font-weight:600;color:#ffffff;min-width:20px;text-align:center;">{{ bookForm.quantity }}</span>
          <div @click="bookForm.quantity++" style="width:28px;height:28px;border-radius:14px;border:1px solid #3a3a5c;display:flex;align-items:center;justify-content:center;color:#b0b0c0;font-size:16px;cursor:pointer;">+</div>
        </div>
      </div>
      <div style="margin-bottom:12px;">
        <div style="font-size:13px;color:#b0b0c0;margin-bottom:6px;">选择日期 *</div>
        <div style="display:flex;gap:8px;">
          <div v-for="d in dateOptions" :key="d.value" @click="bookForm.date=d.value"
               :style="{flex:1,textAlign:'center',padding:'10px 0',borderRadius:8,border: bookForm.date===d.value?'2px solid #c9a96e':'1px solid #3a3a5c',color:bookForm.date===d.value?'#c9a96e':'#b0b0c0',fontWeight:bookForm.date===d.value?600:400,fontSize:13,cursor:'pointer',background:bookForm.date===d.value?'rgba(201,169,110,.1)':'transparent'}">
            {{ d.label }}
          </div>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-size:13px;color:#b0b0c0;margin-bottom:6px;">选择时段 *</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          <div v-for="s in timeSlots" :key="s" @click="bookForm.timeSlot=s"
               :style="{padding:'8px 14px',borderRadius:8,border:bookForm.timeSlot===s?'2px solid #c9a96e':'1px solid #3a3a5c',color:bookForm.timeSlot===s?'#c9a96e':'#b0b0c0',fontWeight:bookForm.timeSlot===s?600:400,fontSize:13,cursor:'pointer',background:bookForm.timeSlot===s?'rgba(201,169,110,.1)':'transparent'}">
            {{ s }}
          </div>
        </div>
      </div>
      <van-button type="primary" block round @click="submitOrder" :loading="submitting" :disabled="!bookForm.phone || !bookForm.timeSlot">
        确认下单 · ¥{{ formatPrice((bookGood?.price||0) * bookForm.quantity) }}
      </van-button>
    </div>
  </van-popup>
  </template>
</div>

<script>
// ---- 前端配置 ----
let WX_APP_ID = 'wx9e7f92a7fad7e40f';
let BASE_URL = 'https://wx.qlc.xn--6qq986b3xl';
const WX_OAUTH_BASE = 'https://open.weixin.qq.com/connect/oauth2/authorize';

async function initConfig() {
  try {
    const res = await fetch('/config/frontend');
    if (res.ok) {
      const cfg = await res.json();
      if (cfg.app_id) WX_APP_ID = cfg.app_id;
      if (cfg.base_url) BASE_URL = cfg.base_url;
    }
  } catch {}
}

async function wxLogin() {
  const token = localStorage.getItem('wx_token');
  if (token) return token;

  const params = new URLSearchParams(location.search);
  const code = params.get('code');

  if (code) {
    const res = await fetch(`/wechat/auth?code=${code}`);
    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('wx_token', data.token);
      params.delete('code');
      params.delete('state');
      const clean = params.toString();
      history.replaceState(null, '', location.pathname + (clean ? '?' + clean : ''));
      return data.token;
    }
  }

  const redirectUri = encodeURIComponent(BASE_URL + location.pathname);
  location.href = `${WX_OAUTH_BASE}?appid=${WX_APP_ID}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_userinfo&state=customer#wechat_redirect`;
}

async function wxJSSDKInit() {
  try {
    const url = location.href.split('#')[0];
    const res = await fetch(`/wechat/jssdk?url=${encodeURIComponent(url)}`);
    if (!res.ok) return;
    const cfg = await res.json();
    wx.config({
      debug: false,
      appId: cfg.appId,
      timestamp: cfg.timestamp,
      nonceStr: cfg.nonceStr,
      signature: cfg.signature,
      jsApiList: ['updateAppMessageShareData', 'updateTimelineShareData', 'getLocation', 'chooseWXPay']
    });
  } catch (e) {
    console.warn('JS-SDK 初始化失败:', e);
  }
}

const { createApp, ref, computed, watch, onMounted, onUnmounted, nextTick } = Vue;

const app = createApp({
  setup() {
    const API = '';
    const TOKEN = () => localStorage.getItem('wx_token') || '';
    const ready = ref(false);
    const loginError = ref(false);

    const activeTab = ref(0);
    const goods = ref([]);
    const orders = ref([]);
    const user = ref({});
    const userId = ref(0);
    const messages = ref([]);
    const currentOrder = ref(null);
    const msgInput = ref('');
    const chatBox = ref(null);
    const showBook = ref(false);
    const bookGood = ref(null);
    const bookForm = ref({ phone: '', date: '', timeSlot: '', quantity: 1 });
    const showDetail = ref(false);
    const detailGood = ref(null);
    const detailImages = ref([]);
    const submitting = ref(false);
    const conversations = ref([]);
    const activeConv = ref(null);      // 当前打开的会话 {thread_type, thread_id, good_title}
    const convMessages = ref([]);      // 当前会话的消息
    const convMsgInput = ref('');      // 当前会话的输入框
    const convChatBox = ref(null);     // 当前会话的滚动容器 ref

    // ---- 未读追踪 ----
    const unreadCount = computed(() => conversations.value.reduce((sum, c) => sum + (c.unread_count || 0), 0));
    async function markRead(threadType, threadId) {
      try { await api(`/chat/read/${threadType}/${threadId}`, { method: 'POST' }); } catch {}
    }
    const orderFilter = ref(null); // null=全部, 1=已下单, 2=已完成, 3=退款中, 4=已退款
    const orderStats = computed(() => {
      const s = { ordered: 0, completed: 0 };
      for (const o of orders.value) {
        if (o.status === 1) s.ordered++;
        else if (o.status === 2) s.completed++;
      }
      return s;
    });
    const filteredOrders = computed(() => {
      if (orderFilter.value === null) return orders.value;
      return orders.value.filter(o => o.status === orderFilter.value);
    });
    function goToOrders(status) {
      orderFilter.value = status;
      activeTab.value = 1;
    }
    function clearFilter() {
      orderFilter.value = null;
    }
    const showContact = ref(false);
    const contactInfo = ref({ wechat: '', phone: '' });
    async function contactMerchant() {
      try {
        contactInfo.value = await api('/config/contact');
      } catch {}
      showContact.value = true;
    }
    function copyText(text) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => vant.showToast('已复制'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        vant.showToast('已复制');
      }
    }
    const orderMessageCache = ref({});
    const convMessageCache = ref({});

    const timeSlots = ['09:00-10:00','10:00-11:00','11:00-12:00','14:00-15:00','15:00-16:00','16:00-17:00','19:00-20:00','20:00-21:00'];
    const dateOptions = ref([]);

    function initDateOptions() {
      const today = new Date();
      const options = [];
      for (let i = 0; i < 3; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() + i);
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        const weekday = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
        const val = `${d.getFullYear()}-${mm}-${dd}`;
        const label = i === 0 ? `今天 ${mm}/${dd}` : i === 1 ? `明天 ${mm}/${dd}` : `${weekday} ${mm}/${dd}`;
        options.push({ value: val, label });
      }
      dateOptions.value = options;
      bookForm.value.date = options[0].value;
    }
    let pollTimer = null;

    const headers = () => ({ 'X-Token': TOKEN(), 'Content-Type': 'application/json' });

    async function api(path, opts = {}) {
      const res = await fetch(API + path, { headers: headers(), ...opts });
      if (res.status === 401) {
        localStorage.removeItem('wx_token');
        location.reload();
        throw new Error('登录已过期');
      }
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function loadGoods() { goods.value = await api('/goods'); }
    async function loadOrders() { orders.value = await api('/my_orders'); }
    async function loadMe() {
      try { user.value = await api('/me'); userId.value = user.value.id; } catch {}
    }
    async function loadChat(orderId) {
      messages.value = orderMessageCache.value[orderId] ? [...orderMessageCache.value[orderId]] : [];
      const loaded = await api(`/chat/order/${orderId}?after_id=0`);
      messages.value = loaded;
      orderMessageCache.value[orderId] = [...loaded];
      if (loaded.length) markRead('order', orderId);
      await nextTick();
      if (chatBox.value && isNearBottom(chatBox.value)) chatBox.value.scrollTop = chatBox.value.scrollHeight;
    }
    async function pollChat() {
      if (activeTab.value === 1 && currentOrder.value) {
        const lastId = messages.value.length ? messages.value[messages.value.length - 1].id : 0;
        const newMsgs = await api(`/chat/order/${currentOrder.value.id}?after_id=${lastId}`);
        if (newMsgs.length) {
          messages.value.push(...newMsgs);
          orderMessageCache.value[currentOrder.value.id] = [...messages.value];
          markRead('order', currentOrder.value.id);
          await nextTick();
          if (chatBox.value && isNearBottom(chatBox.value)) chatBox.value.scrollTop = chatBox.value.scrollHeight;
        }
      } else if (activeTab.value === 2 && activeConv.value) {
        await pollConvChat();
      } else {
        await loadConversations();
      }
    }

    function openDetail(g) {
      detailGood.value = g;
      try { detailImages.value = JSON.parse(g.detail_images || '[]'); } catch { detailImages.value = []; }
      showDetail.value = true;
    }
    function previewImage(index) {
      vant.ImagePreview({ images: detailImages.value, startPosition: index });
    }

    function openBook(g) {
      bookGood.value = g;
      initDateOptions();
      bookForm.value = { phone: '', date: dateOptions.value[0]?.value || '', timeSlot: '', quantity: 1 };
      showBook.value = true;
    }
    async function submitOrder() {
      if (submitting.value) return;
      if (!/^1\d{10}$/.test(bookForm.value.phone)) {
        vant.showToast('请输入正确的手机号');
        return;
      }
      submitting.value = true;
      let unpaidOrderId = null;
      try {
        const res = await api('/pay/create', {
          method: 'POST',
          body: JSON.stringify({
            good_id: bookGood.value.id,
            phone: bookForm.value.phone,
            address: '',
            quantity: bookForm.value.quantity,
            appointment_time: bookForm.value.date + ' ' + bookForm.value.timeSlot,
          }),
        });

        if (res.mock) {
          await api(`/pay/mock/confirm/${res.order_id}`, { method: 'POST' });
          showBook.value = false;
          vant.showToast('下单成功');
          try { await loadOrders(); } catch {}
          activeTab.value = 1;
          return;
        }

        // 真实支付：调 WeixinJSBridge 公众号支付（V3 signType=RSA）
        const payParams = res.pay_params;
        unpaidOrderId = res.order_id;
        await new Promise((resolve, reject) => {
          function onBridgeReady() {
            WeixinJSBridge.invoke(
              'getBrandWCPayRequest',
              {
                appId: payParams.appId,
                timeStamp: payParams.timeStamp,
                nonceStr: payParams.nonceStr,
                package: payParams.package,
                signType: payParams.signType,
                paySign: payParams.paySign,
              },
              function (res) {
                if (res.err_msg === 'get_brand_wcpay_request:ok') {
                  resolve();
                } else {
                  reject(new Error(res.err_msg));
                }
              }
            );
          }
          if (typeof WeixinJSBridge === 'undefined') {
            document.addEventListener('WeixinJSBridgeReady', onBridgeReady, false);
          } else {
            onBridgeReady();
          }
        });

        showBook.value = false;
        vant.showToast('支付成功');
        loadOrders();
        activeTab.value = 1;
      } catch (e) {
        const msg = e.message || e.errMsg || e;
        if (msg.includes('cancel') || msg.includes('get_brand_wcpay_request:cancel')) {
          vant.showToast('已取消支付');
          // 关闭未支付订单，清理数据库
          if (unpaidOrderId) {
            try { await api(`/pay/close/${unpaidOrderId}`, { method: 'POST' }); } catch {}
          }
        } else {
          vant.showToast('下单失败: ' + msg);
        }
      } finally {
        submitting.value = false;
      }
    }
    function openOrderDetail(order) {
      currentOrder.value = order;
    }
    async function refundOrder(order) {
      try {
        await vant.showConfirmDialog({ title: '确认退款', message: '确认申请退款？退款将原路返回。' });
      } catch { return; }
      submitting.value = true;
      try {
        await api(`/pay/refund/${order.id}`, { method: 'POST', body: JSON.stringify({}) });
        vant.showToast('退款申请已提交');
        loadOrders();
        closeOrderDetail();
      } catch (e) {
        vant.showToast('退款失败: ' + (e.message || e));
      } finally {
        submitting.value = false;
      }
    }
    function closeOrderDetail() {
      currentOrder.value = null;
    }
    async function viewOrderGood(order) {
      const g = goods.value.find(g => g.id === order.good_id);
      if (g) return openDetail(g);
      // 商品不在本地列表（可能已下架），从后端获取
      try {
        const resp = await api('/goods/' + order.good_id);
        if (resp) openDetail(resp);
      } catch { vant.showToast('商品已删除'); }
    }
    async function sendMessage() {
      if (!msgInput.value.trim() || !currentOrder.value) return;
      try {
        const sent = await api('/chat', {
          method: 'POST',
          body: JSON.stringify({ thread_type: 'order', thread_id: currentOrder.value.id, content: msgInput.value })
        });
        msgInput.value = '';
        messages.value.push(sent);
        orderMessageCache.value[currentOrder.value.id] = [...messages.value];
        markRead('order', currentOrder.value.id);
        await nextTick();
        if (chatBox.value && isNearBottom(chatBox.value)) chatBox.value.scrollTop = chatBox.value.scrollHeight;
      } catch (e) { vant.showToast('发送失败'); }
    }

    function sameMessages(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (a[i].id !== b[i].id) return false;
      }
      return true;
    }
    function mergeConversations(list) {
      const prevMap = new Map(conversations.value.map(item => [item.thread_id, item]));
      conversations.value = list.map(item => {
        const prev = prevMap.get(item.thread_id);
        return prev ? Object.assign(prev, item) : item;
      });
      if (activeConv.value) {
        const nextActive = conversations.value.find(item => item.thread_id === activeConv.value.thread_id);
        if (nextActive) activeConv.value = nextActive;
      }
    }
    async function loadConversations() {
      try {
        const list = await api('/chat/conversations');
        mergeConversations(list);
      } catch {}
    }
    async function openConversation(conv) {
      activeConv.value = conv;
      const key = conv.thread_id;
      const cached = convMessageCache.value[key] ? [...convMessageCache.value[key]] : [];
      convMessages.value = cached;
      const loaded = await api(`/chat/${conv.thread_type}/${key}?after_id=0`);
      if (!sameMessages(cached, loaded)) convMessages.value = loaded;
      convMessageCache.value[key] = [...loaded];
      if (loaded.length) markRead(conv.thread_type, key);
      else if (conv.last_msg_id) markRead(conv.thread_type, key);
      await nextTick();
      if (convChatBox.value && isNearBottom(convChatBox.value)) convChatBox.value.scrollTop = convChatBox.value.scrollHeight;
    }
    function closeConversation() {
      activeConv.value = null;
      convMessages.value = [];
    }
    async function pollConvChat() {
      if (!activeConv.value) return;
      const key = activeConv.value.thread_id;
      const lastId = convMessages.value.length ? convMessages.value[convMessages.value.length - 1].id : 0;
      const newMsgs = await api(`/chat/${activeConv.value.thread_type}/${key}?after_id=${lastId}`);
      if (newMsgs.length) {
        convMessages.value.push(...newMsgs);
        convMessageCache.value[key] = [...convMessages.value];
        markRead(activeConv.value.thread_type, key);
        await nextTick();
        if (convChatBox.value && isNearBottom(convChatBox.value)) convChatBox.value.scrollTop = convChatBox.value.scrollHeight;
      }
    }
    async function startConsult(good) {
      try {
        const res = await api('/consult', {
          method: 'POST',
          body: JSON.stringify({ good_id: good.id })
        });
        showDetail.value = false;
        activeTab.value = 2;
        const conv = { thread_type: res.thread_type, thread_id: res.thread_id, good_title: res.good_title, good_img_url: res.good_img_url };
        activeConv.value = conv;
        const key = res.thread_id;
        const cached = convMessageCache.value[key] ? [...convMessageCache.value[key]] : [];
        convMessages.value = cached;
        const loaded = await api(`/chat/${res.thread_type}/${key}?after_id=0`);
        if (!sameMessages(cached, loaded)) convMessages.value = loaded;
        convMessageCache.value[key] = [...loaded];
        await nextTick();
        if (convChatBox.value && isNearBottom(convChatBox.value)) convChatBox.value.scrollTop = convChatBox.value.scrollHeight;
      } catch (e) {
        vant.showToast('咨询失败，请重试');
      }
    }
    async function sendConvMessage() {
      if (!convMsgInput.value.trim() || !activeConv.value) return;
      try {
        const sent = await api('/chat', {
          method: 'POST',
          body: JSON.stringify({ thread_type: activeConv.value.thread_type, thread_id: activeConv.value.thread_id, content: convMsgInput.value })
        });
        convMsgInput.value = '';
        convMessages.value.push(sent);
        convMessageCache.value[activeConv.value.thread_id] = [...convMessages.value];
        markRead(activeConv.value.thread_type, activeConv.value.thread_id);
        await nextTick();
        if (convChatBox.value && isNearBottom(convChatBox.value)) convChatBox.value.scrollTop = convChatBox.value.scrollHeight;
      } catch (e) { vant.showToast('发送失败'); }
    }
    // 切换到消息Tab时自动加载会话列表
    watch(activeTab, async (tab) => {
      if (tab === 2) {
        await loadConversations();
        await nextTick();
        if (activeConv.value && convChatBox.value) convChatBox.value.scrollTop = convChatBox.value.scrollHeight;
      }
    });
    watch(activeConv, async (conv) => {
      if (conv) {
        await nextTick();
        if (convChatBox.value && isNearBottom(convChatBox.value)) convChatBox.value.scrollTop = convChatBox.value.scrollHeight;
      }
    });

    function formatPrice(fen) { return (fen / 100).toFixed(2); }
    function isNearBottom(el) { return el.scrollHeight - el.scrollTop - el.clientHeight < 100; }

    function statusText(s) { return {0:'待付款',1:'已下单',2:'已完成',3:'退款中',4:'已退款'}[s] ?? '未知'; }
    function statusColor(s) { return {0:'#787890',1:'#d4a03c',2:'#07c160',3:'#e6a23c',4:'#c0564a'}[s] ?? '#787890'; }
    function statusClass(s) { return {0:'status-unpaid',1:'status-pending',2:'status-completed',3:'status-pending',4:'status-unpaid'}[s] ?? 'status-unpaid'; }
    function roleLabel(r) { return { CUSTOMER: '客户', MERCHANT: '商家' }[r] || r; }
    function formatTime(ts) {
      const d = new Date(ts * 1000);
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const time = pad(d.getHours()) + ':' + pad(d.getMinutes());
      const isToday = d.toDateString() === now.toDateString();
      if (isToday) return time;
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return '昨天 ' + time;
      return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + time;
    }

    onMounted(async () => {
      try {
        await initConfig();
        await wxLogin();
        ready.value = true;
        loginError.value = false;
        wxJSSDKInit();
        loadGoods();
        loadOrders();
        loadMe();
        loadConversations();
        pollTimer = setInterval(pollChat, 5000);
        window.addEventListener('resize', () => {
          if (chatBox.value && isNearBottom(chatBox.value)) chatBox.value.scrollTop = chatBox.value.scrollHeight;
        });
      } catch (e) {
        console.error('登录失败:', e);
        loginError.value = true;
      }
    });

    function retryLogin() {
      loginError.value = false;
      localStorage.removeItem('wx_token');
      location.reload();
    }

    onUnmounted(() => { clearInterval(pollTimer); pollTimer = null; });

    // 页面可见性：切后台暂停轮询，回前台恢复
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        clearInterval(pollTimer); pollTimer = null;
      } else if (ready.value) {
        if (pollTimer) clearInterval(pollTimer);
