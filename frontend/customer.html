<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>到店按摩</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://fastly.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<style>
:root {
  --bg-primary: #f6f2eb;
  --bg-card: #fbf8f2;
  --bg-card-hover: #f1ece2;
  --bg-input: #fffdf8;
  --bg-chat: #f6f2eb;
  --bg-bar: #f7f4ee;
  --accent: #556a61;
  --accent-soft: rgba(85, 106, 97, 0.1);
  --text-title: #161514;
  --text-body: #4d4943;
  --text-secondary: #7d786f;
  --border: #d8d2c6;
  --border-strong: #bdb4a4;
  --status-success: #556a61;
  --status-warning: #877252;
  --status-danger: #8d635a;
  --status-info: #6c7d88;
  --shadow-soft: 0 18px 40px rgba(24, 21, 16, 0.04);
  --radius-lg: 24px;
  --radius-md: 18px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
@keyframes fadeRise {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
body {
  background: var(--bg-primary);
  font-family: "IBM Plex Sans", "PingFang SC", "Hiragino Sans GB", sans-serif;
  color: var(--text-body);
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; }

/* Loading */
.loading-mask {
  position: fixed;
  inset: 0;
  background: var(--bg-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.error-panel { text-align: center; }
.error-text { color: var(--text-body); margin-bottom: 16px; }
.page-section { padding-bottom: 60px; }
.content-grow { flex: 1; }
.content-grow.min { min-width: 0; }
.title-15 { font-size: 15px; }
.meta-13 { font-size: 13px; }
.meta-13.top-gap { margin-top: 4px; }
.inline-flex-start {
  display: flex;
  align-items: center;
  gap: 12px;
}
.thumb-70 {
  width: 70px;
  height: 70px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
}
.price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 4px;
}
.metric-price {
  color: var(--text-title);
  font-size: 18px;
  font-weight: 600;
  font-family: "Noto Serif SC", serif;
}
.chevron-inline {
  color: var(--text-secondary);
  align-self: center;
  font-size: 14px;
}
.detail-facts-wrap {
  padding: 0 18px 14px;
}
.appt-row {
  font-size: 13px;
}
.appt-row + .appt-row {
  margin-top: 4px;
}
.action-bar {
  display: flex;
  gap: 8px;
}
.action-bar.top-spaced {
  padding: 0 10px;
  margin-top: 12px;
}
.header-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
}
.message-meta-item.align-right {
  text-align: right;
}
.empty-state.compact {
  padding: 40px 0;
}
.popup-panel.scrollable {
  max-height: 60vh;
  overflow-y: auto;
}
.detail-popup-shell {
  max-height: 85vh;
  overflow-y: auto;
}
.detail-cta-actions {
  display: flex;
  gap: 10px;
}
.btn-flex-1 { flex: 1; }
.btn-flex-2 { flex: 2; }
.book-panel { padding: 20px; }
.book-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-title);
}
.book-block { margin-bottom: 12px; }
.book-block.lg { margin-bottom: 16px; }
.book-block.double {
  display: flex;
  gap: 10px;
}
.book-row-between {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.book-col { flex: 1; }
.book-stepper-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.book-qty {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-title);
  min-width: 20px;
  text-align: center;
}
.book-options-row {
  display: flex;
  gap: 8px;
}
.book-options-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.book-popup input[type="datetime-local"] {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 11px 12px;
  font-size: 14px;
  outline: none;
  background: var(--bg-input);
  color: var(--text-title);
}
.book-popup input[type="datetime-local"]::-webkit-calendar-picker-indicator {
  opacity: 0.72;
}

.page-hero {
  padding: 32px 18px 28px;
  border-bottom: 1px solid rgba(216, 210, 198, 0.9);
  animation: fadeRise .55s ease both;
}
.page-title {
  font-family: "Noto Serif SC", serif;
  font-size: 31px;
  line-height: 1.28;
  color: var(--text-title);
}
.catalog-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 16px;
  padding: 18px 18px 2px;
}
.catalog-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-title);
}
.catalog-count {
  flex-shrink: 0;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.order-section-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 16px;
  padding: 18px 18px 6px;
}
.order-section-copy {
  max-width: 32rem;
}
.order-section-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-title);
}
.order-section-count {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.order-card-index {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.order-card-index::before {
  content: "";
  width: 16px;
  height: 1px;
  background: rgba(125, 120, 111, 0.55);
}
.order-card-meta-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid rgba(216, 210, 198, 0.92);
}
.order-card-meta-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.order-card-meta-value {
  margin-top: 5px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-title);
}
.order-detail-shell {
  padding-bottom: 70px;
}
.order-detail-facts {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
}
.order-detail-fact {
  padding: 14px 12px;
  border-radius: 18px;
  background: var(--bg-card);
  border: 1px solid rgba(216, 210, 198, 0.92);
}
.order-detail-fact-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.order-detail-fact-value {
  margin-top: 6px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-title);
  font-weight: 500;
}

/* Product Grid */
.good-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  padding: 18px;
  contain: layout paint;
}
.good-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid rgba(216, 210, 198, 0.92);
  cursor: pointer;
  transition: background-color .18s ease, border-color .18s ease, transform .18s ease;
  box-shadow: var(--shadow-soft);
  animation: fadeRise .55s ease both;
}
.good-card:active {
  background: var(--bg-card-hover);
  border-color: var(--border-strong);
  transform: translateY(1px);
}
.good-card img {
  width: 100%;
  aspect-ratio: 5 / 4;
  object-fit: cover;
  display: block;
  filter: saturate(0.92);
}
.good-card-info { padding: 14px; }
.good-card-serial {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.good-card-serial::before {
  content: "";
  width: 18px;
  height: 1px;
  background: rgba(125, 120, 111, 0.55);
}
.good-card-title {
  font-size: 15px;
  line-height: 1.45;
  font-weight: 600;
  color: var(--text-title);
  min-height: 2.8em;
  overflow: hidden;
  margin-top: 12px;
}
.good-card-bottom {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 8px;
  margin-top: 12px;
}
.good-card-price {
  color: var(--text-title);
  font-family: "Noto Serif SC", serif;
  font-size: 22px;
  font-weight: 600;
}
.good-card-price .unit { font-size: 12px; }
.good-card-original {
  display: inline-block;
  font-size: 11px;
  color: var(--text-secondary);
  text-decoration: line-through;
  margin-left: 6px;
}
.good-card-tag {
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 999px;
}
.good-card-meta { font-size: 11px; color: var(--text-secondary); margin-top: 8px; }

/* Order */
.order-card {
  background: var(--bg-card);
  margin: 0 18px 14px;
  border-radius: var(--radius-md);
  padding: 16px;
  border: 1px solid rgba(216, 210, 198, 0.92);
  cursor: pointer;
  box-shadow: var(--shadow-soft);
  animation: fadeRise .55s ease both;
}
.order-status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  color: var(--text-secondary);
  border: 1px solid currentColor;
  background: transparent;
}
.status-consult { color: var(--status-info); }
.status-unpaid { color: var(--text-secondary); }
.status-pending { color: var(--status-warning); }
.status-accepted { color: var(--status-success); }
.status-completed { color: var(--text-secondary); }
.section-pad-bottom { padding-bottom: 76px; }
.empty-state {
  text-align: center;
  padding: 72px 18px;
  color: var(--text-secondary);
  font-size: 13px;
  line-height: 1.8;
}
.row-between { display: flex; justify-content: space-between; align-items: center; }
.title-white { font-weight: 600; color: var(--text-title); }
.subtle-text { font-size: 13px; color: var(--text-body); }
.gold-price { color: var(--text-title); font-weight: 600; }
.chat-bubble-col { display: flex; flex-direction: column; }
.meta-time { font-size: 11px; color: var(--text-secondary); }
.conv-title-row { display: flex; align-items: center; gap: 6px; min-width: 0; }
.conv-title-text { font-weight: 600; color: var(--text-title); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.consult-badge { flex-shrink: 0; font-size: 10px; border: 1px solid var(--status-info); color: var(--status-info); padding: 2px 7px; border-radius: 999px; }
.unread-badge {
  flex-shrink: 0;
  min-width: 18px;
  height: 18px;
  border-radius: 999px;
  background: var(--text-title);
  color: var(--bg-primary);
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
}
.status-badge-sm { font-size: 10px; padding: 1px 8px; }
.time-right { flex-shrink: 0; margin-left: 8px; }
.single-line-preview { font-size: 13px; color: var(--text-body); margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.order-summary-text { font-size: 13px; color: var(--text-body); margin-top: 8px; line-height: 1.7; }
.order-price {
  font-size: 18px;
  color: var(--text-title);
  margin-top: 8px;
  font-family: "Noto Serif SC", serif;
  font-weight: 600;
}

/* Chat */
.chat-wrap {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 54px - env(safe-area-inset-bottom));
  background: transparent;
  contain: layout paint;
}
.message-shell {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
  contain: layout paint;
  display: flex;
  flex-direction: column;
}
.message-stream {
  width: min(100%, 920px);
  margin: 0 auto;
}
.bubble {
  max-width: min(76%, 34rem);
  padding: 12px 14px;
  border-radius: 18px;
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.68;
  word-break: break-all;
  color: var(--text-title);
  border: 1px solid rgba(216, 210, 198, 0.92);
}
.bubble-left {
  background: var(--bg-card);
  align-self: flex-start;
}
.bubble-right {
  background: var(--accent-soft);
  border-color: rgba(85, 106, 97, 0.18);
  align-self: flex-end;
}
.bubble-role { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
.bubble-right .bubble-role { text-align: right; color: var(--accent); }
.bubble-time { font-size: 10px; color: var(--text-secondary); margin-top: 6px; }
.bubble-right .bubble-time { text-align: right; color: var(--accent); }
.bubble-order-card {
  display: grid;
  gap: 4px;
}
.bubble-order-title {
  font-weight: 600;
  color: var(--text-title);
}
.bubble-order-meta {
  font-size: 12px;
  color: var(--text-body);
}
.bubble-order-number {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  width: fit-content;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.bubble-order-number::before {
  content: "";
  width: 16px;
  height: 1px;
  background: rgba(125, 120, 111, 0.55);
}
.chat-input-bar {
  display: flex;
  gap: 10px;
  padding: 12px 18px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  background: var(--bg-bar);
  border-top: 1px solid rgba(216, 210, 198, 0.92);
}
.chat-input-bar input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 11px 16px;
  font-size: 14px;
  outline: none;
  background: var(--bg-input);
  color: var(--text-title);
}
.chat-input-bar input::placeholder { color: var(--text-secondary); }
.chat-input-bar button {
  border: 1px solid var(--text-title);
  background: var(--text-title);
  color: #f7f4ed;
  border-radius: 999px;
  padding: 0 18px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

/* Detail popup */
.detail-popup { background: var(--bg-primary); }
.detail-shell {
  padding-bottom: 110px;
}
.detail-media {
  position: relative;
  padding: 18px 18px 0;
}
.detail-media img {
  width: 100%;
  max-height: 360px;
  object-fit: cover;
  border-radius: 26px;
  display: block;
}
.detail-media-caption {
  position: absolute;
  left: 34px;
  bottom: 16px;
  padding: 6px 10px;
  border-radius: 999px;
  background: var(--bg-bar);
  border: 1px solid rgba(216, 210, 198, 0.92);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.detail-body {
  padding: 22px 18px 0;
}
.detail-summary {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-top: 10px;
}
.detail-price-wrap {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 8px;
}
.detail-lead {
  margin-top: 14px;
  font-size: 14px;
  line-height: 1.95;
  color: var(--text-body);
}
.detail-facts {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-top: 24px;
}
.detail-fact {
  padding: 14px 12px;
  border-radius: 18px;
  background: var(--bg-card);
  border: 1px solid rgba(216, 210, 198, 0.92);
}
.detail-fact-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.detail-fact-value {
  margin-top: 8px;
  font-size: 15px;
  line-height: 1.5;
  color: var(--text-title);
  font-weight: 600;
}
.detail-gallery {
  margin-top: 26px;
}
.detail-gallery-label {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.detail-gallery-item {
  margin-bottom: 10px;
}
.detail-popup .detail-title {
  font-family: "Noto Serif SC", serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--text-title);
  line-height: 1.35;
}
.detail-popup .detail-price {
  color: var(--text-title);
  font-size: 30px;
  font-weight: 600;
  font-family: "Noto Serif SC", serif;
}
.detail-popup .detail-original { font-size: 14px; color: var(--text-secondary); text-decoration: line-through; }
.detail-popup .detail-meta { font-size: 13px; color: var(--text-secondary); }
.detail-popup .detail-desc { font-size: 14px; color: var(--text-body); line-height: 1.9; white-space: pre-wrap; }
.detail-popup .detail-img { width: 100%; border-radius: 8px; }
.detail-cta {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 14px 18px;
  padding-bottom: calc(14px + env(safe-area-inset-bottom));
  background: var(--bg-bar);
  border-top: 1px solid rgba(216, 210, 198, 0.92);
}

.popup-panel {
  padding: 20px;
}
.popup-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-title);
  margin-bottom: 12px;
}
.popup-empty {
  text-align: center;
  padding: 20px 0;
  color: var(--text-secondary);
  font-size: 13px;
}

/* Booking popup */
.book-popup { background: var(--bg-card); }
.book-popup input[type="tel"] { width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 11px 12px; font-size: 14px; outline: none; background: var(--bg-input); color: var(--text-title); }
.book-popup input::placeholder { color: var(--text-secondary); }
.book-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
.book-stepper {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 16px;
  cursor: pointer;
  background: var(--bg-input);
}

/* Order detail header */
.detail-header {
  background: var(--bg-bar);
  padding: 14px 18px;
  border-bottom: 1px solid rgba(216, 210, 198, 0.92);
  display: flex;
  align-items: center;
  contain: layout paint;
}
.detail-header .back-arrow { font-size: 20px; cursor: pointer; margin-right: 10px; color: var(--text-title); }

/* Product card in order detail (clickable) */
.order-good-card {
  background: var(--bg-card);
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 14px;
  cursor: pointer;
  border-left: 2px solid var(--text-title);
  contain: layout paint;
}
.order-good-card:active { background: var(--bg-card-hover); }

/* Appointment info */
.appt-info { background: var(--bg-card); padding: 16px 18px; border-bottom: 1px solid var(--border); contain: layout paint; }
.appt-info .label { color: var(--text-title); }
.appt-info .value { color: var(--text-body); }

/* Profile */
.profile-section { padding: 0 0 60px; contain: layout paint; }
.profile-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 28px 20px 22px;
  background: transparent;
  border-bottom: 1px solid rgba(216, 210, 198, 0.92);
}
.profile-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--text-title);
  color: #f7f4ed;
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: "Noto Serif SC", serif;
}
.profile-info { min-width: 0; }
.profile-name { font-size: 17px; font-weight: 600; color: var(--text-title); }
.profile-phone { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.profile-stats {
  display: flex;
  background: var(--bg-card);
  margin: 18px;
  border-radius: var(--radius-md);
  border: 1px solid rgba(216, 210, 198, 0.92);
  padding: 18px 0;
  box-shadow: var(--shadow-soft);
  animation: fadeRise .55s ease both;
}
.stat-item { flex: 1; text-align: center; cursor: pointer; }
.stat-num { font-size: 24px; font-weight: 600; color: var(--text-title); font-family: "Noto Serif SC", serif; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.filter-bar { display: flex; gap: 8px; padding: 16px 18px 8px; overflow-x: auto; }
.filter-tag {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 13px;
  color: var(--text-secondary);
  background: transparent;
  border: 1px solid rgba(216, 210, 198, 0.92);
  cursor: pointer;
}
.filter-tag.active { color: #f7f4ed; background: var(--text-title); border-color: var(--text-title); font-weight: 600; }

/* Vant light overrides */
.van-tabbar {
  background: var(--bg-bar) !important;
  border-top: 1px solid rgba(216, 210, 198, 0.92) !important;
  padding-bottom: env(safe-area-inset-bottom) !important;
}
.van-tabbar-item--active { color: var(--text-title) !important; }
.van-tabbar-item { color: var(--text-secondary) !important; background: transparent !important; }
.van-popup--bottom { background: var(--bg-primary) !important; }
.van-popup__content { background: transparent; }
.van-button--primary {
  background: var(--text-title) !important;
  border-color: var(--text-title) !important;
  color: #f7f4ed !important;
  font-weight: 600 !important;
}
.van-button--danger {
  background: transparent !important;
  border-color: var(--status-danger) !important;
  color: var(--status-danger) !important;
}
.van-button--default {
  border-color: var(--border) !important;
  color: var(--text-title) !important;
  background: var(--bg-card) !important;
}
.van-cell-group--inset {
  background: var(--bg-card) !important;
  margin: 0 18px !important;
  border-radius: var(--radius-md) !important;
  overflow: hidden;
  border: 1px solid rgba(216, 210, 198, 0.92);
  box-shadow: var(--shadow-soft);
}
.van-cell { background: var(--bg-card) !important; color: var(--text-body) !important; }
.van-cell__title { color: var(--text-body) !important; }
.van-cell__value { color: var(--text-title) !important; }
.van-cell::after { border-color: rgba(216, 210, 198, 0.92) !important; }
.van-field__control,
.van-field__control::placeholder { color: var(--text-title) !important; }
.van-field__label { color: var(--text-secondary) !important; }
.van-loading__text { color: var(--text-title) !important; }
.van-loading__spinner .van-loading__dot { background: var(--text-title) !important; }

@media (min-width: 860px) {
  .page-hero-grid {
    grid-template-columns: minmax(0, 1.5fr) minmax(240px, 0.8fr);
    align-items: end;
  }
  .good-grid,
  .section-pad-bottom,
  .profile-section,
  .chat-wrap,
  .detail-popup > div,
  .book-popup,
  .chat-messages,
  .page-hero {
    max-width: 1080px;
    margin-left: auto;
    margin-right: auto;
  }
  .chat-wrap { height: calc(100vh - 64px); }
  .good-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}

@media (max-width: 640px) {
  .good-grid {
    grid-template-columns: 1fr;
  }
  .order-card-meta-grid,
  .detail-facts {
    grid-template-columns: 1fr;
  }
  .order-detail-facts {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<script>
// ---- 前端配置 ----
let WX_APP_ID = '';
let BASE_URL = 'https://wx.qlc.xn--6qq986b3xl';
const WX_OAUTH_BASE = 'https://open.weixin.qq.com/connect/oauth2/authorize';

async function initConfig() {
  const res = await fetch('/config/frontend');
  const cfg = await res.json().catch(() => null);
  if (!res.ok) {
    const detail = cfg && typeof cfg.detail === 'string' && cfg.detail.trim()
      ? cfg.detail.trim()
      : '前端配置获取失败';
    throw new Error(detail);
  }
  if (!cfg || typeof cfg.app_id !== 'string' || !cfg.app_id.trim()) {
    throw new Error('WX_APP_ID 未配置');
  }
  WX_APP_ID = cfg.app_id.trim();
  if (cfg.base_url) BASE_URL = cfg.base_url;
}

async function wxLogin() {
  const token = localStorage.getItem('wx_token');
  if (token) return token;

  const params = new URLSearchParams(location.search);
  const code = params.get('code');

  if (code) {
    const res = await fetch(`/wechat/auth?code=${code}`);
    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('wx_token', data.token);
      params.delete('code');
      params.delete('state');
      const clean = params.toString();
      history.replaceState(null, '', location.pathname + (clean ? '?' + clean : ''));
      return data.token;
    }
  }

  if (!WX_APP_ID) {
    throw new Error('WX_APP_ID 未配置');
  }

  const redirectUri = encodeURIComponent(BASE_URL + location.pathname);
  location.href = `${WX_OAUTH_BASE}?appid=${WX_APP_ID}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_userinfo&state=customer#wechat_redirect`;
}

async function wxJSSDKInit() {
  try {
    const url = location.href.split('#')[0];
    const res = await fetch(`/wechat/jssdk?url=${encodeURIComponent(url)}`);
    if (!res.ok) return;
    const cfg = await res.json();
    wx.config({
      debug: false,
      appId: cfg.appId,
      timestamp: cfg.timestamp,
      nonceStr: cfg.nonceStr,
      signature: cfg.signature,
      jsApiList: ['updateAppMessageShareData', 'updateTimelineShareData', 'getLocation', 'chooseWXPay']
    });
  } catch (e) {
    console.warn('JS-SDK 初始化失败:', e);
  }
}

const { createApp, ref, computed, watch, onMounted, onUnmounted, nextTick } = Vue;

const app = createApp({
  setup() {
    const API = '';
    const TOKEN = () => localStorage.getItem('wx_token') || '';
    const headers = () => ({ 'X-Token': TOKEN(), 'Content-Type': 'application/json' });

    const ready = ref(false);
    const loginError = ref(false);
    const activeTab = ref(0);

    const goods = ref([]);
    const orders = ref([]);
    const user = ref({});
    const currentOrder = ref(null);

    const showBook = ref(false);
    const bookGood = ref(null);
    const bookForm = ref({ phone: '', arrivalAt: '', quantity: 1 });
    const showDetail = ref(false);
    const detailGood = ref(null);
    const detailImages = ref([]);
    const submitting = ref(false);

    const conversation = ref(null);
    const conversationMessages = ref([]);
    const conversationInput = ref('');
    const conversationBox = ref(null);
    const merchantContacts = ref([]);
    const showContactPicker = ref(false);
    const showOrderPicker = ref(false);

    const bookMinArrival = ref('');
    const orderFilter = ref(null);

    const unreadCount = computed(() => conversation.value?.unread_count || 0);
    const orderStats = computed(() => {
      const stats = { ordered: 0, completed: 0 };
      for (const order of orders.value) {
        if (order.status === 1) stats.ordered++;
        else if (order.status === 2) stats.completed++;
      }
      return stats;
    });
    const filteredOrders = computed(() => {
      if (orderFilter.value === null) return orders.value;
      return orders.value.filter(order => order.status === orderFilter.value);
    });
    const selectedOrderList = computed(() => orders.value.filter(order => order.status >= 1));

    let pollTimer = null;

    function formatPrice(fen) {
      return (Number(fen || 0) / 100).toFixed(2);
    }

    function isNearBottom(el) {
      return el.scrollHeight - el.scrollTop - el.clientHeight < 100;
    }

    function scrollConversationToBottom(force = false) {
      if (!conversationBox.value) return;
      if (force || isNearBottom(conversationBox.value)) {
        conversationBox.value.scrollTop = conversationBox.value.scrollHeight;
      }
    }

    async function api(path, opts = {}) {
      const res = await fetch(API + path, { headers: headers(), ...opts });
      if (res.status === 401) {
        localStorage.removeItem('wx_token');
        location.reload();
        throw new Error('登录已过期');
      }
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function toDateTimeLocalValue(date) {
      const pad = n => String(n).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function nextArrivalTimeValue() {
      const date = new Date();
      date.setMinutes(date.getMinutes() + 60);
      date.setSeconds(0, 0);
      const minutes = date.getMinutes();
      if (minutes > 0 && minutes <= 30) {
        date.setMinutes(30);
      } else if (minutes > 30) {
        date.setHours(date.getHours() + 1, 0, 0, 0);
      }
      return toDateTimeLocalValue(date);
    }

    function formatArrivalTime(value) {
      return value ? value.replace('T', ' ') : '';
    }

    function goToOrders(status) {
      orderFilter.value = status;
      activeTab.value = 1;
    }

    function clearFilter() {
      orderFilter.value = null;
    }

    async function loadGoods() {
      goods.value = await api('/goods');
    }

    async function loadOrders() {
      orders.value = await api('/my_orders');
    }

    async function loadMe() {
      try {
        user.value = await api('/me');
      } catch {}
    }

    async function loadConversationSummary() {
      conversation.value = await api('/conversation');
    }

    async function loadMerchantContacts() {
      merchantContacts.value = await api('/merchant-contacts');
    }

    async function ensureConversationLoaded() {
      if (!conversation.value) await loadConversationSummary();
      if (!merchantContacts.value.length) await loadMerchantContacts();
    }

    async function loadConversationMessages(afterId = 0) {
      const list = await api(`/conversation/messages?after_id=${afterId}`);
      if (afterId === 0) {
        conversationMessages.value = list;
      } else if (list.length) {
        conversationMessages.value.push(...list);
      }
      if (conversationMessages.value.length) {
        await api('/conversation/read', {
          method: 'POST',
          body: JSON.stringify({ last_message_id: conversationMessages.value[conversationMessages.value.length - 1].id }),
        });
        if (conversation.value) conversation.value.unread_count = 0;
      }
      await nextTick();
      scrollConversationToBottom(afterId === 0);
    }

    async function sendConversationText() {
      if (!conversationInput.value.trim()) return;
      try {
        const sent = await api('/conversation/messages', {
          method: 'POST',
          body: JSON.stringify({ message_type: 'text', content: conversationInput.value }),
        });
        conversationInput.value = '';
        conversationMessages.value.push(sent);
        await loadConversationSummary();
        await nextTick();
        scrollConversationToBottom(true);
      } catch (e) {
        vant.showToast((e.message || '发送失败').replace(/^Error:\s*/, ''));
      }
    }

    async function sendOrderCard(order) {
      await ensureConversationLoaded();
      try {
        const sent = await api('/conversation/messages', {
          method: 'POST',
          body: JSON.stringify({ message_type: 'order_card', order_id: order.id }),
        });
        conversationMessages.value.push(sent);
        showOrderPicker.value = false;
        activeTab.value = 2;
        await loadConversationSummary();
        await nextTick();
        scrollConversationToBottom(true);
      } catch (e) {
        vant.showToast((e.message || '发送失败').replace(/^Error:\s*/, ''));
      }
    }

    async function switchMerchantContact(contact) {
      const updated = await api('/conversation/default-contact', {
        method: 'POST',
        body: JSON.stringify({ merchant_contact_id: contact.id }),
      });
      conversation.value = { ...(conversation.value || {}), ...updated };
      showContactPicker.value = false;
    }

    async function contactAboutOrder(order) {
      if (!order) return;
      activeTab.value = 2;
      await ensureConversationLoaded();
      if (!conversationMessages.value.length) {
        await loadConversationMessages(0);
      }
      await sendOrderCard(order);
    }

    async function openGeneralConversation() {
      activeTab.value = 2;
      await ensureConversationLoaded();
      if (!conversationMessages.value.length) {
        await loadConversationMessages(0);
      }
    }

    async function pollConversation() {
      if (!conversation.value) {
        await loadConversationSummary();
        return;
      }
      if (activeTab.value !== 2) {
        await loadConversationSummary();
        return;
      }
      const lastId = conversationMessages.value.length
        ? conversationMessages.value[conversationMessages.value.length - 1].id
        : 0;
      const newer = await api(`/conversation/messages?after_id=${lastId}`);
      if (newer.length) {
        conversationMessages.value.push(...newer);
        await api('/conversation/read', {
          method: 'POST',
          body: JSON.stringify({ last_message_id: conversationMessages.value[conversationMessages.value.length - 1].id }),
        });
        if (conversation.value) conversation.value.unread_count = 0;
        await loadConversationSummary();
        await nextTick();
        scrollConversationToBottom(true);
      } else {
        await loadConversationSummary();
      }
    }

    function openDetail(good) {
      detailGood.value = good;
      try {
        detailImages.value = JSON.parse(good.detail_images || '[]');
      } catch {
        detailImages.value = [];
      }
      showDetail.value = true;
    }

    function previewImage(index) {
      vant.ImagePreview({ images: detailImages.value, startPosition: index });
    }

    function openBook(good) {
      bookGood.value = good;
      const defaultArrival = nextArrivalTimeValue();
      bookMinArrival.value = defaultArrival;
      bookForm.value = { phone: '', arrivalAt: defaultArrival, quantity: 1 };
      showBook.value = true;
    }

    async function submitOrder() {
      if (submitting.value) return;
      if (!/^1\d{10}$/.test(bookForm.value.phone)) {
        vant.showToast('请输入正确的手机号');
        return;
      }
      submitting.value = true;
      let unpaidOrderId = null;
      try {
        const res = await api('/pay/create', {
          method: 'POST',
          body: JSON.stringify({
            good_id: bookGood.value.id,
            phone: bookForm.value.phone,
            address: '',
            quantity: bookForm.value.quantity,
            appointment_time: formatArrivalTime(bookForm.value.arrivalAt),
          }),
        });

        if (res.mock) {
          await api(`/pay/mock/confirm/${res.order_id}`, { method: 'POST' });
          showBook.value = false;
          vant.showToast('下单成功');
          await loadOrders();
          activeTab.value = 1;
          return;
        }

        const payParams = res.pay_params;
        unpaidOrderId = res.order_id;
        await new Promise((resolve, reject) => {
          function onBridgeReady() {
            WeixinJSBridge.invoke(
              'getBrandWCPayRequest',
              {
                appId: payParams.appId,
                timeStamp: payParams.timeStamp,
                nonceStr: payParams.nonceStr,
                package: payParams.package,
                signType: payParams.signType,
                paySign: payParams.paySign,
              },
              function (wxRes) {
                if (wxRes.err_msg === 'get_brand_wcpay_request:ok') {
                  resolve();
                } else {
                  reject(new Error(wxRes.err_msg));
                }
              }
            );
          }
          if (typeof WeixinJSBridge === 'undefined') {
            document.addEventListener('WeixinJSBridgeReady', onBridgeReady, false);
          } else {
            onBridgeReady();
          }
        });

        showBook.value = false;
        vant.showToast('支付成功');
        await loadOrders();
        activeTab.value = 1;
      } catch (e) {
        const msg = e.message || e.errMsg || e;
        if (String(msg).includes('cancel') || String(msg).includes('get_brand_wcpay_request:cancel')) {
          vant.showToast('已取消支付');
          if (unpaidOrderId) {
            try { await api(`/pay/close/${unpaidOrderId}`, { method: 'POST' }); } catch {}
          }
        } else {
          vant.showToast('下单失败: ' + msg);
        }
      } finally {
        submitting.value = false;
      }
    }

    function openOrderDetail(order) {
      currentOrder.value = order;
    }

    async function refundOrder(order) {
      try {
        await vant.showConfirmDialog({ title: '确认退款', message: '确认申请退款？退款将原路返回。' });
      } catch {
        return;
      }
      submitting.value = true;
      try {
        await api(`/pay/refund/${order.id}`, { method: 'POST', body: JSON.stringify({}) });
        vant.showToast('退款申请已提交');
        await loadOrders();
        closeOrderDetail();
      } catch (e) {
        vant.showToast('退款失败: ' + (e.message || e));
      } finally {
        submitting.value = false;
      }
    }

    function closeOrderDetail() {
      currentOrder.value = null;
    }

    async function viewOrderGood(order) {
      const good = goods.value.find(item => item.id === order.good_id);
      if (good) {
        openDetail(good);
        return;
      }
      try {
        const resp = await api('/goods/' + order.good_id);
        if (resp) openDetail(resp);
      } catch {
        vant.showToast('商品已删除');
      }
    }

    function statusText(status) {
      return { 0: '待付款', 1: '已下单', 2: '已完成', 3: '退款中', 4: '已退款' }[status] ?? '未知';
    }

    function statusColor(status) {
      return { 0: '#7d786f', 1: '#877252', 2: '#556a61', 3: '#7f7153', 4: '#8d635a' }[status] ?? '#7d786f';
    }

    function statusClass(status) {
      return { 0: 'status-unpaid', 1: 'status-pending', 2: 'status-completed', 3: 'status-pending', 4: 'status-unpaid' }[status] ?? 'status-unpaid';
    }

    function roleLabel(role) {
      return { CUSTOMER: '客户', MERCHANT: '商家' }[role] || role;
    }

    function formatTime(ts) {
      const d = new Date(Number(ts || 0) * 1000);
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
      if (d.toDateString() === now.toDateString()) return time;
      const yesterday = new Date(now);
      yesterday.setDate(now.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return '昨天 ' + time;
      return `${d.getMonth() + 1}/${d.getDate()} ${time}`;
    }

    function retryLogin() {
      loginError.value = false;
      localStorage.removeItem('wx_token');
      location.reload();
    }

    async function handlePoll() {
      await loadOrders();
      await pollConversation();
    }

    const handleResize = () => scrollConversationToBottom();
    const handleVisibilityChange = () => {
      if (document.hidden) {
        clearInterval(pollTimer);
        pollTimer = null;
      } else if (ready.value) {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(handlePoll, 5000);
        loadOrders();
        loadConversationSummary();
      }
    };

    watch(activeTab, async tab => {
      if (tab === 2) {
        await ensureConversationLoaded();
        await loadConversationMessages(0);
      }
    });

    onMounted(async () => {
      try {
        await initConfig();
        await wxLogin();
        ready.value = true;
        loginError.value = false;
        wxJSSDKInit();
        await Promise.all([
          loadGoods(),
          loadOrders(),
          loadMe(),
          loadConversationSummary(),
          loadMerchantContacts(),
        ]);
        pollTimer = setInterval(handlePoll, 5000);
        window.addEventListener('resize', handleResize);
        document.addEventListener('visibilitychange', handleVisibilityChange);
      } catch (e) {
        console.error('登录失败:', e);
        loginError.value = true;
      }
    });

    onUnmounted(() => {
      clearInterval(pollTimer);
      pollTimer = null;
      window.removeEventListener('resize', handleResize);
      document.removeEventListener('visibilitychange', handleVisibilityChange);
    });

    return {
      ready,
      loginError,
      activeTab,
      goods,
      orders,
      user,
      currentOrder,
      showBook,
      bookGood,
      bookForm,
      submitting,
      showDetail,
      detailGood,
      detailImages,
      conversation,
      conversationMessages,
      conversationInput,
      conversationBox,
      merchantContacts,
      showContactPicker,
      showOrderPicker,
      bookMinArrival,
      orderStats,
      orderFilter,
      filteredOrders,
      selectedOrderList,
      openBook,
      submitOrder,
      refundOrder,
      openOrderDetail,
      closeOrderDetail,
      viewOrderGood,
      openDetail,
      previewImage,
      sendConversationText,
      sendOrderCard,
      switchMerchantContact,
      contactAboutOrder,
      openGeneralConversation,
      unreadCount,
      statusText,
      statusColor,
      statusClass,
      roleLabel,
      formatTime,
      formatPrice,
      retryLogin,
      goToOrders,
      clearFilter,
    };
  }
});

app.use(vant);
app.mount('#app');
</script>
</body>
</html>
