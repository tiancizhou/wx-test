<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>超级管理员</title>
<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css">
<script src="https://fastly.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.login-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-box { background: #fff; border-radius: 12px; padding: 30px 20px; width: 100%; max-width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
.login-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 24px; color: #333; }
.user-row { display: flex; align-items: center; padding: 12px 16px; background: #fff; border-bottom: 1px solid #f0f0f0; }
.role-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; color: #fff; }
</style>
</head>
<body>
<div id="app">
  <!-- 登录界面 -->
  <div v-if="!loggedIn" class="login-wrap">
    <div class="login-box">
      <div class="login-title">超级管理员</div>
      <van-field v-model="password" type="password" label="密码" placeholder="请输入管理员密码" @keyup.enter="login" />
      <van-button type="primary" block round style="margin-top:20px;" @click="login" :loading="loading">登录</van-button>
      <div v-if="loginError" style="color:#e74c3c;font-size:13px;margin-top:10px;text-align:center;">{{ loginError }}</div>
    </div>
  </div>

  <!-- 管理界面 -->
  <template v-else>
  <!-- 商家联系方式配置 -->
  <div style="padding:12px 16px;font-weight:600;font-size:16px;">商家联系方式</div>
  <van-cell-group inset style="margin-bottom:16px;">
    <van-field v-model="contactForm.wechat" label="微信号" placeholder="商家微信号" />
    <van-field v-model="contactForm.phone" label="手机号" placeholder="商家手机号" type="tel" />
  </van-cell-group>
  <div style="padding:0 16px 12px;">
    <van-button type="primary" block round size="small" @click="saveContact" :loading="savingContact">保存联系方式</van-button>
  </div>

  <div style="padding:12px 16px;font-weight:600;font-size:16px;display:flex;justify-content:space-between;align-items:center;">
    <span>用户管理 ({{ users.length }})</span>
    <van-button size="small" type="primary" @click="showCreate=true">创建用户</van-button>
  </div>

  <div v-if="!users.length" style="text-align:center;padding:60px 0;color:#999;">暂无用户</div>
  <div v-for="u in users" :key="u.id" class="user-row">
    <div style="flex:1;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-weight:500;">{{ u.nickname || u.openid.slice(0,16) }}</span>
        <span class="role-tag" :style="{background: roleColor(u.role)}">{{ roleName(u.role) }}</span>
      </div>
      <div style="font-size:12px;color:#999;margin-top:4px;">
        ID: {{ u.id }} · OpenID: {{ u.openid.slice(0,20) }}{{ u.openid.length > 20 ? '...' : '' }}
      </div>
      <div v-if="u.phone" style="font-size:12px;color:#666;">{{ u.phone }}</div>
    </div>
    <div style="display:flex;gap:6px;">
      <van-button size="mini" @click="openEdit(u)">编辑</van-button>
      <van-button size="mini" type="danger" plain @click="confirmDelete(u)">删除</van-button>
    </div>
  </div>

  <!-- 创建用户弹窗 -->
  <van-popup v-model:show="showCreate" position="bottom" round :style="{ minHeight: '50%' }">
    <div style="padding:20px;">
      <div style="font-size:16px;font-weight:600;margin-bottom:16px;">创建用户</div>
      <van-cell-group inset>
        <van-field v-model="createForm.openid" label="OpenID" placeholder="用户唯一标识" />
        <van-field v-model="createForm.nickname" label="昵称" placeholder="可选" />
        <van-field v-model="createForm.phone" label="手机号" placeholder="可选" type="tel" />
      </van-cell-group>
      <div style="padding:10px 16px;font-size:14px;color:#666;">角色</div>
      <van-radio-group v-model="createForm.role" direction="horizontal" style="padding:0 16px;">
        <van-radio name="CUSTOMER" style="margin-right:12px;">客户</van-radio>
        <van-radio name="MERCHANT" style="margin-right:12px;">商家</van-radio>
        <van-radio name="SERVICE" style="margin-right:12px;">客服</van-radio>
        <van-radio name="ADMIN">管理员</van-radio>
      </van-radio-group>
      <van-button type="primary" block round style="margin-top:16px;" @click="createUser">创建</van-button>
    </div>
  </van-popup>

  <!-- 编辑用户弹窗 -->
  <van-popup v-model:show="showEdit" position="bottom" round :style="{ minHeight: '45%' }">
    <div style="padding:20px;">
      <div style="font-size:16px;font-weight:600;margin-bottom:16px;">编辑用户</div>
      <van-cell-group inset>
        <van-field v-model="editForm.nickname" label="昵称" />
        <van-field v-model="editForm.phone" label="手机号" type="tel" />
      </van-cell-group>
      <div style="padding:10px 16px;font-size:14px;color:#666;">角色</div>
      <van-radio-group v-model="editForm.role" direction="horizontal" style="padding:0 16px;">
        <van-radio name="CUSTOMER" style="margin-right:12px;">客户</van-radio>
        <van-radio name="MERCHANT" style="margin-right:12px;">商家</van-radio>
        <van-radio name="SERVICE" style="margin-right:12px;">客服</van-radio>
        <van-radio name="ADMIN">管理员</van-radio>
      </van-radio-group>
      <van-button type="primary" block round style="margin-top:16px;" @click="updateUser">保存</van-button>
    </div>
  </van-popup>
  </template>
</div>

<script>
const { createApp, ref, onMounted } = Vue;

const app = createApp({
  setup() {
    const password = ref('');
    const loggedIn = ref(false);
    const loading = ref(false);
    const loginError = ref('');
    const users = ref([]);
    const showCreate = ref(false);
    const showEdit = ref(false);
    const createForm = ref({ openid: '', nickname: '', phone: '', role: 'CUSTOMER' });
    const editForm = ref({ id: 0, nickname: '', phone: '', role: '' });
    const contactForm = ref({ wechat: '', phone: '' });
    const savingContact = ref(false);

    function getKey() { return localStorage.getItem('admin_key') || ''; }
    function headers() { return { 'X-Admin-Key': getKey(), 'Content-Type': 'application/json' }; }

    async function api(path, opts = {}) {
      const res = await fetch(path, { headers: headers(), ...opts });
      if (res.status === 401) {
        localStorage.removeItem('admin_key');
        loggedIn.value = false;
        throw new Error('登录已过期，请重新登录');
      }
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text);
      }
      return res.json();
    }

    async function login() {
      loading.value = true;
      loginError.value = '';
      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: password.value }),
        });
        if (!res.ok) {
          const data = await res.json();
          loginError.value = data.detail || '登录失败';
          return;
        }
        localStorage.setItem('admin_key', password.value);
        loggedIn.value = true;
        loadUsers();
        loadContact();
      } catch (e) {
        loginError.value = e.message;
      } finally {
        loading.value = false;
      }
    }

    async function loadUsers() {
      try { users.value = await api('/admin/users'); } catch (e) { console.error(e); }
    }
    async function loadContact() {
      try { contactForm.value = await api('/config/contact'); } catch (e) { console.error(e); }
    }
    async function saveContact() {
      savingContact.value = true;
      try {
        await api('/config/contact?wechat=' + encodeURIComponent(contactForm.value.wechat) + '&phone=' + encodeURIComponent(contactForm.value.phone), { method: 'PUT' });
        vant.showToast('已保存');
      } catch (e) { vant.showToast('保存失败'); }
      finally { savingContact.value = false; }
    }

    async function createUser() {
      try {
        await api('/admin/users', {
          method: 'POST',
          body: JSON.stringify(createForm.value),
        });
        showCreate.value = false;
        createForm.value = { openid: '', nickname: '', phone: '', role: 'CUSTOMER' };
        vant.showToast('创建成功');
        loadUsers();
      } catch (e) { vant.showToast('创建失败: ' + e.message); }
    }

    function openEdit(u) {
      editForm.value = { id: u.id, nickname: u.nickname, phone: u.phone, role: u.role };
      showEdit.value = true;
    }

    async function updateUser() {
      try {
        await api(`/admin/users/${editForm.value.id}`, {
          method: 'PUT',
          body: JSON.stringify({
            nickname: editForm.value.nickname,
            phone: editForm.value.phone,
            role: editForm.value.role,
          }),
        });
        showEdit.value = false;
        vant.showToast('已保存');
        loadUsers();
      } catch (e) { vant.showToast('保存失败: ' + e.message); }
    }

    function confirmDelete(u) {
      vant.showConfirmDialog({ title: '确认删除', message: `删除用户 ${u.nickname || u.openid.slice(0,16)}？` })
        .then(() => deleteUser(u.id))
        .catch(() => {});
    }

    async function deleteUser(id) {
      try {
        await api(`/admin/users/${id}`, { method: 'DELETE' });
        vant.showToast('已删除');
        loadUsers();
      } catch (e) { vant.showToast('删除失败: ' + e.message); }
    }

    function roleColor(r) {
      return { CUSTOMER: '#07c160', MERCHANT: '#1890ff', SERVICE: '#ff9800', ADMIN: '#e74c3c' }[r] || '#999';
    }

    function roleName(r) {
      return { CUSTOMER: '客户', MERCHANT: '商家', SERVICE: '客服', ADMIN: '管理员' }[r] || r;
    }

    onMounted(async () => {
      const key = localStorage.getItem('admin_key');
      if (key) {
        try {
          const res = await fetch('/admin/users', { headers: { 'X-Admin-Key': key } });
          if (res.ok) {
            password.value = key;
            loggedIn.value = true;
            loadUsers();
            loadContact();
          } else {
            localStorage.removeItem('admin_key');
          }
        } catch {
          localStorage.removeItem('admin_key');
        }
      }
    });

    return {
      password, loggedIn, loading, loginError, users,
      showCreate, showEdit, createForm, editForm,
      contactForm, savingContact, saveContact,
      login, loadUsers, createUser, openEdit, updateUser, confirmDelete, roleColor, roleName,
    };
  }
});

app.use(vant);
app.mount('#app');
</script>
</body>
</html>
